<!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore MAGIZHVAGAM Return Gifts catalog. Filter by occasion, material, colors, and price to find the perfect premium custom return gift.">
  <title>Catalog | MAGIZHVAGAM - Return Gifts & customized Gifts</title>
  
  <link rel="stylesheet" href="/assets/css/theme.defaults.css">
  <link rel="stylesheet" href="/assets/css/design-system.css">
  <link rel="stylesheet" href="/assets/css/typography.css">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
  <style id="mz-theme-vars"></style>
  <script src="/assets/js/theme-loader.js"></script>
  
  <style>
    .catalog-layout {
      display: flex;
      gap: 30px;
      padding: 100px 0 60px;
    }
    .filter-sidebar {
      width: 280px;
      flex-shrink: 0;
      position: sticky;
      top: 90px;
      height: fit-content;
      padding: 24px;
    }
    .filter-title {
      font-size: 18px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--card-border);
      padding-bottom: 10px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .form-control {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: rgba(0,0,0,0.02);
      color: var(--text-color);
      font-size: 13px;
    }
    .form-control:focus {
      border-color: hsl(var(--primary-purple));
      background: white;
    }
    .catalog-main {
      flex-grow: 1;
    }
  </style>
</head>
<body class="inner-page">

  <!-- Shared Header -->
  <header id="main-header" class="glass-panel mz-storefront-header"></header>

  <div class="container">
    <div class="catalog-layout">
      
      <!-- Filters Sidebar -->
      <!-- Filters Sidebar -->
      <aside class="filter-sidebar glass animated scale-in">
        <div class="filter-sidebar-header">
          <h3 class="filter-title" style="font-family:'Outfit';">Refine Search</h3>
          <button type="button" class="filter-close-btn" id="mobile-filter-close" aria-label="Close filters">✕ Close</button>
        </div>
        
        <form id="filter-form">
          <div class="filter-sidebar-content">
            <div class="form-group" style="position:relative;">
              <label for="filter-search">Keyword Search</label>
              <input type="text" id="filter-search" class="form-control" placeholder="Key, title, tag..." autocomplete="off">
              <div id="search-suggestions-box" class="glass" style="position:absolute; top:100%; left:0; width:100%; max-height:280px; overflow-y:auto; border:1px solid var(--card-border); border-radius:12px; z-index:999; display:none; padding:12px; margin-top:6px; box-shadow:0 12px 30px rgba(0,0,0,0.15); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); background:var(--card-bg);">
                <!-- Loaded dynamically -->
              </div>
            </div>
            
            <div class="form-group">
              <label for="filter-category">Event Category</label>
              <select id="filter-category" class="form-control">
                <option value="">All Categories</option>
                <!-- Loaded dynamically -->
              </select>
            </div>

            <div class="form-group">
              <label>Price Range (₹)</label>
              <div style="display:flex; gap:8px;">
                <input type="number" id="filter-min-price" class="form-control" placeholder="Min" min="0">
                <input type="number" id="filter-max-price" class="form-control" placeholder="Max" min="0">
              </div>
            </div>

            <div class="form-group">
              <label for="filter-material">Material</label>
              <select id="filter-material" class="form-control">
                <option value="">Any Material</option>
                <option value="Brass">Brass</option>
                <option value="Jute">Jute</option>
                <option value="Wooden">Wooden</option>
                <option value="Ceramic">Ceramic</option>
                <option value="Clay">Clay / Terracotta</option>
                <option value="Silver">Silver Plated</option>
                <option value="Leather">Leather</option>
              </select>
            </div>

            <div class="form-group">
              <label for="filter-color">Color Accent</label>
              <input type="text" id="filter-color" class="form-control" placeholder="e.g. Gold, Silver, Pink">
            </div>

            <div class="form-group">
              <label for="filter-occasion">Occasion Tag</label>
              <select id="filter-occasion" class="form-control">
                <option value="">Any Occasion</option>
                <option value="wedding">Wedding</option>
                <option value="birthday">Birthday</option>
                <option value="baby-shower">Baby Shower</option>
                <option value="corporate">Corporate</option>
                <option value="festival">Festival</option>
                <option value="housewarming">Housewarming</option>
              </select>
            </div>

            <!-- Availability filter -->
            <div class="form-group">
              <label for="filter-availability">Availability</label>
              <select id="filter-availability" class="form-control">
                <option value="">All Products</option>
                <option value="inStock">In Stock Only</option>
                <option value="outOfStock">Out of Stock Only</option>
              </select>
            </div>

            <!-- Rating filter -->
            <div class="form-group">
              <label for="filter-rating">Minimum Rating</label>
              <select id="filter-rating" class="form-control">
                <option value="">Any Rating</option>
                <option value="5">★★★★★ (5 Stars)</option>
                <option value="4">★★★★☆ & Above (4+ Stars)</option>
                <option value="3">★★★☆☆ & Above (3+ Stars)</option>
                <option value="2">★★☆☆☆ & Above (2+ Stars)</option>
              </select>
            </div>

            <!-- Boolean toggles checkboxes -->
            <div class="form-group" style="display:flex; flex-direction:column; gap:8px; margin-top:20px;">
              <label style="display:flex; align-items:center; gap:8px; font-weight:600; cursor:pointer; font-size:12px; color:var(--text-color);">
                <input type="checkbox" id="filter-discount" style="cursor:pointer;"> 🏷️ On Discount Only
              </label>
              <label style="display:flex; align-items:center; gap:8px; font-weight:600; cursor:pointer; font-size:12px; color:var(--text-color);">
                <input type="checkbox" id="filter-featured" style="cursor:pointer;"> ⭐ Featured Items Only
              </label>
              <label style="display:flex; align-items:center; gap:8px; font-weight:600; cursor:pointer; font-size:12px; color:var(--text-color);">
                <input type="checkbox" id="filter-new-arrivals" style="cursor:pointer;"> 🚀 New Arrivals Only
              </label>
            </div>
          </div>

          <div class="filter-sidebar-footer">
            <button type="submit" class="btn btn-primary" style="width:100%; border-radius:8px; font-size:13px; margin-bottom:10px; margin-top:15px;">Apply Filters</button>
            <button type="button" onclick="clearAllFilters()" class="btn btn-secondary" style="width:100%; border-radius:8px; font-size:13px;">Clear All</button>
          </div>
        </form>
      </aside>

      <!-- Main Catalog Display -->
      <main class="catalog-main">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:16px;">
          <h2 style="font-size:24px; font-family:'Outfit'; color:var(--text-color);">Gifts Collection</h2>
          
          <div class="desktop-sort-wrapper">
            <select id="filter-sort" class="form-control" style="width:180px; font-weight:600;">
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
              <option value="priceLowHigh">Price: Low to High</option>
              <option value="priceHighLow">Price: High to Low</option>
              <option value="highestRated">Highest Rated</option>
              <option value="mostPopular">Most Popular</option>
              <option value="bestSelling">Best Selling</option>
              <option value="alphabetical">Alphabetical (A-Z)</option>
            </select>
          </div>
        </div>

        <!-- Sticky Sort & Filter Bar for Mobile/Tablet -->
        <div class="mobile-sort-filter-sticky-bar" id="mobile-sort-filter-bar">
          <button type="button" class="mobile-bar-btn" id="mobile-sort-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px; vertical-align:middle;">
              <line x1="4" y1="9" x2="20" y2="9"></line>
              <line x1="4" y1="15" x2="20" y2="15"></line>
              <circle cx="9" cy="9" r="2"></circle>
              <circle cx="15" cy="15" r="2"></circle>
            </svg>
            Sort
          </button>

          <!-- Mobile Sort Dropdown overlay -->
          <div class="mobile-sort-dropdown" id="mobile-sort-dropdown">
            <button type="button" class="sort-option-btn" data-value="mostPopular">Recommended / Featured <span class="checkmark">✓</span></button>
            <button type="button" class="sort-option-btn" data-value="newest">Newest First <span class="checkmark">✓</span></button>
            <button type="button" class="sort-option-btn" data-value="bestSelling">Best Selling <span class="checkmark">✓</span></button>
            <button type="button" class="sort-option-btn" data-value="priceLowHigh">Price: Low to High <span class="checkmark">✓</span></button>
            <button type="button" class="sort-option-btn" data-value="priceHighLow">Price: High to Low <span class="checkmark">✓</span></button>
            <button type="button" class="sort-option-btn" data-value="highestRated">Highest Rated <span class="checkmark">✓</span></button>
            <button type="button" class="sort-option-btn" data-value="oldest">Oldest First <span class="checkmark">✓</span></button>
            <button type="button" class="sort-option-btn" data-value="alphabetical">Alphabetical (A-Z) <span class="checkmark">✓</span></button>
          </div>

          <div class="mobile-bar-divider"></div>
          <button type="button" class="mobile-bar-btn" id="mobile-filter-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px; vertical-align:middle;">
              <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
            </svg>
            Filter
          </button>
        </div>

        <div class="grid grid-3" id="catalog-grid" style="min-height:400px;">
          <!-- Loaded dynamically -->
        </div>

        <!-- Pagination -->
        <div id="catalog-pagination" style="display:flex; justify-content:center; align-items:center; margin-top:50px;">
          <!-- Loaded dynamically -->
        </div>
      </main>

    </div>
  </div>

  <!-- Shared Footer -->
  <footer id="main-footer" class="ft-layout-wrapper"></footer>

  <!-- Mobile Filter Backdrop -->
  <div class="mobile-filter-backdrop" id="mobile-filter-backdrop"></div>

  <!-- Scripts -->
  <script src="/assets/js/animation-loader.js"></script>
  <script src="/assets/js/nav.js"></script>
  <script src="/assets/vendor/gsap.min.js"></script>
  <script src="/assets/vendor/ScrollTrigger.min.js"></script>
  <script src="/assets/vendor/lenis.min.js"></script>
  <script src="/assets/js/motion-system.js"></script>
  <script src="/assets/js/storefront-init.js"></script>
  <script src="/assets/js/store-enhancements.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/products.js"></script>
</body>
</html>
