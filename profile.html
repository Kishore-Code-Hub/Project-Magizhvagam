<!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Dashboard | MAGIZHVAGAM</title>
  
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
  
  <style>
    .profile-layout {
      padding: 100px 0 60px;
      visibility: hidden;
    }
    .profile-layout.profile-ready {
      visibility: visible;
    }
    .profile-container {
      display: flex;
      gap: 30px;
      margin-top: 30px;
    }
    .profile-sidebar {
      width: 250px;
      flex-shrink: 0;
      padding: 20px;
      border-radius: 12px;
      height: fit-content;
      position: relative;
      z-index: 2;
    }
    .menu-link {
      display: block;
      padding: 12px 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: var(--transition);
      color: var(--text-muted);
    }
    .menu-link.active, .menu-link:hover {
      background: rgba(106, 13, 173, 0.05);
      color: hsl(var(--primary-purple));
    }
    .profile-main {
      flex-grow: 1;
    }
    .profile-tab {
      display: none;
    }
    .profile-tab.active {
      display: block;
      animation: fadeInUp 0.5s ease;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .form-control {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: rgba(0,0,0,0.02);
      color: var(--text-color);
      font-size: 13px;
    }
    .form-control:focus {
      border-color: hsl(var(--primary-purple));
      background: white;
    }

    /* Order tracking milestones */
    .tracking-steps {
      display: flex;
      justify-content: space-between;
      margin: 20px 0;
      position: relative;
    }
    .tracking-steps::after {
      content: '';
      position: absolute;
      top: 15px;
      left: 5%;
      right: 5%;
      height: 3px;
      background: var(--card-border);
      z-index: 1;
    }
    .step-node {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-color);
      border: 3px solid var(--card-border);
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 12px;
      color: var(--text-muted);
    }
    .step-node.completed {
      border-color: #22c55e;
      background: #22c55e;
      color: white;
    }
    .step-node.active {
      border-color: hsl(var(--primary-purple));
      background: hsl(var(--primary-purple));
      color: white;
    }
  </style>
</head>
<body>

  <!-- Shared Header -->
  <header id="main-header"></header>

  <main class="container profile-layout">
    <h1 style="font-family:'Outfit'; font-size:32px; color:var(--text-color);">My Account Dashboard</h1>
    
    <div class="profile-container">
      
      <!-- Sidebar Options -->
      <aside class="profile-sidebar glass animated scale-in">
        <div class="menu-link profile-nav-link active" data-tab="tab-profile" role="button" tabindex="0">Profile details</div>
        <div class="menu-link profile-nav-link" data-tab="tab-addresses" role="button" tabindex="0">Address book</div>
        <div class="menu-link profile-nav-link" data-tab="tab-orders" role="button" tabindex="0">Order history</div>
        <div class="menu-link profile-nav-link" data-tab="tab-wishlist" role="button" tabindex="0">Wishlist</div>
        <div class="menu-link profile-sign-out" id="profile-sign-out-btn" role="button" tabindex="0" style="color:#ef4444; border-top:1px solid var(--card-border); margin-top:20px; border-radius:0; padding-top:20px;">Sign Out</div>
      </aside>

      <!-- Main Dash Panel -->
      <section class="profile-main">
        
        <!-- Tab 1: Profile details -->
        <div class="profile-tab active glass" id="tab-profile" style="padding:30px; border-radius:12px;">
          <h3 style="font-family:'Outfit'; font-size:20px; margin-bottom:20px; color:hsl(var(--primary-purple));">Personal Information</h3>
          
          <form id="profile-edit-form">
            <div class="form-group">
              <label for="profile-name">Full Name</label>
              <input type="text" id="profile-name" class="form-control" required style="border: 1px solid var(--card-border);">
            </div>
            <div class="form-group">
              <label for="profile-email">Email Address</label>
              <input type="email" id="profile-email" class="form-control" required style="border: 1px solid var(--card-border);">
            </div>
            <button type="submit" class="btn btn-primary" style="border-radius:8px; padding:10px 24px;">Save Modifications</button>
          </form>
        </div>

        <!-- Tab 2: Address book -->
        <div class="profile-tab glass" id="tab-addresses" style="padding:30px; border-radius:12px;">
          <h3 style="font-family:'Outfit'; font-size:20px; margin-bottom:20px; color:hsl(var(--primary-purple));">Saved Addresses</h3>
          
          <form id="address-edit-form" style="margin-bottom:30px; border-bottom:1px dashed var(--card-border); padding-bottom:30px;">
            <div class="grid grid-2" style="gap:16px;">
              <div class="form-group">
                <label for="addr-name">Recipient Name</label>
                <input type="text" id="addr-name" class="form-control" placeholder="John Doe" required style="border: 1px solid var(--card-border);">
              </div>
              <div class="form-group">
                <label for="addr-phone">Phone Number</label>
                <input type="tel" id="addr-phone" class="form-control" placeholder="e.g. 9876543210" required style="border: 1px solid var(--card-border);">
              </div>
            </div>
            <div class="form-group">
              <label for="addr-street">Street Address</label>
              <input type="text" id="addr-street" class="form-control" required style="border: 1px solid var(--card-border);">
            </div>
            <div class="grid grid-3" style="gap:16px;">
              <div class="form-group">
                <label for="addr-city">City</label>
                <input type="text" id="addr-city" class="form-control" required style="border: 1px solid var(--card-border);">
              </div>
              <div class="form-group">
                <label for="addr-state">State</label>
                <input type="text" id="addr-state" class="form-control" required style="border: 1px solid var(--card-border);">
              </div>
              <div class="form-group">
                <label for="addr-zip">Zip/Postal Code</label>
                <input type="text" id="addr-zip" class="form-control" required style="border: 1px solid var(--card-border);">
              </div>
            </div>
            <div class="form-group" style="display:flex; align-items:center; gap:8px; margin-top:4px;">
              <input type="checkbox" id="addr-default" style="width:auto;">
              <label for="addr-default" style="margin:0; font-size:13px;">Set as default shipping address</label>
            </div>
            <button type="submit" id="address-submit-btn" class="btn btn-primary" style="border-radius:8px; padding:10px 24px;">Save Address</button>
          </form>
          
          <div id="address-list-display" style="display:flex; flex-direction:column; gap:16px;">
            <!-- Loaded dynamically -->
          </div>
        </div>

        <!-- Tab 3: Order history -->
        <div class="profile-tab glass" id="tab-orders" style="padding:30px; border-radius:12px;">
          <h3 style="font-family:'Outfit'; font-size:20px; margin-bottom:20px; color:hsl(var(--primary-purple));">My Order Logs</h3>
          
          <div id="orders-list-display" style="display:flex; flex-direction:column; gap:20px;">
            <!-- Loaded dynamically -->
          </div>
        </div>

        <!-- Tab 4: Wishlist -->
        <div class="profile-tab glass" id="tab-wishlist" style="padding:30px; border-radius:12px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px;">
            <h3 style="font-family:'Outfit'; font-size:20px; margin:0; color:hsl(var(--primary-purple));">My Wishlist</h3>
            <a href="/wishlist.html" class="btn btn-secondary" style="border-radius:8px; padding:8px 16px; font-size:13px;">Open full wishlist</a>
          </div>
          <div id="profile-wishlist-grid" class="grid grid-4" style="gap:20px;">
            <p style="color:var(--text-muted); font-size:13px;">Loading wishlist...</p>
          </div>
        </div>

      </section>

    </div>
  </main>

  <!-- Shared Footer -->
  <footer id="main-footer"></footer>

  <!-- Scripts -->
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script>
    let activeUser = null;
    let editingIndex = -1;

    document.addEventListener('DOMContentLoaded', async () => {
      activeUser = await loadUserProfile();
      if (!activeUser || activeUser.role !== 'customer') {
        if (typeof window.setSessionUser === 'function') window.setSessionUser(null);
        window.location.replace('/login.html?redirect=profile.html');
        return;
      }
      if (typeof window.setSessionUser === 'function') {
        window.setSessionUser(activeUser);
      }
      if (typeof syncWishlistFromServer === 'function') await syncWishlistFromServer();
      if (typeof syncCartFromServer === 'function') await syncCartFromServer();

      document.querySelector('.profile-layout')?.classList.add('profile-ready');

      // Profile sidebar navigation (event delegation — no inline onclick)
      document.querySelectorAll('.profile-nav-link').forEach((link) => {
        const activate = () => switchProfileTab(link, link.getAttribute('data-tab'));
        link.addEventListener('click', activate);
        link.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            activate();
          }
        });
      });

      const signOutBtn = document.getElementById('profile-sign-out-btn');
      if (signOutBtn) {
        const doLogout = (e) => {
          e.preventDefault();
          if (typeof window.handleLogout === 'function') window.handleLogout();
        };
        signOutBtn.addEventListener('click', doLogout);
        signOutBtn.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') doLogout(e);
        });
      }

      // Bind profile details
      document.getElementById('profile-name').value = activeUser.name;
      document.getElementById('profile-email').value = activeUser.email;
      
      renderSavedAddresses();
      loadHistoryOrders();
      renderProfileWishlist();

      window.addEventListener('wishlistUpdated', renderProfileWishlist);

      // Switch tab based on URL hash
      const handleHashChange = () => {
        const hash = window.location.hash;
        const tabMap = {
          '#orders': 'tab-orders',
          '#addresses': 'tab-addresses',
          '#profile': 'tab-profile',
          '#wishlist': 'tab-wishlist'
        };
        const panelId = tabMap[hash];
        if (panelId) {
          const link = document.querySelector(`.profile-nav-link[data-tab="${panelId}"]`);
          if (link) switchProfileTab(link, panelId);
        }
      };
      
      handleHashChange();
      window.addEventListener('hashchange', handleHashChange);

      // Submit edits
      document.getElementById('profile-edit-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('profile-name').value.trim();
        const email = document.getElementById('profile-email').value.trim();
        const updated = await updateUserProfile({ name, email });
        if (updated) activeUser = updated;
      });

      // Submit addresses
      document.getElementById('address-edit-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newAddr = {
          fullName: document.getElementById('addr-name').value.trim(),
          phone: document.getElementById('addr-phone').value.trim(),
          street: document.getElementById('addr-street').value.trim(),
          city: document.getElementById('addr-city').value.trim(),
          state: document.getElementById('addr-state').value.trim(),
          zipCode: document.getElementById('addr-zip').value.trim(),
          isDefault: document.getElementById('addr-default')?.checked || false
        };

        let addresses = [...(activeUser.addresses || [])];
        const currentEditIndex = editingIndex;

        if (currentEditIndex > -1) {
          addresses[currentEditIndex] = { ...addresses[currentEditIndex], ...newAddr };
          editingIndex = -1;
          document.getElementById('address-submit-btn').textContent = 'Save Address';
        } else {
          addresses.push(newAddr);
        }

        if (newAddr.isDefault) {
          const defaultIdx = currentEditIndex > -1 ? currentEditIndex : addresses.length - 1;
          addresses = addresses.map((a, i) => ({ ...a, isDefault: i === defaultIdx }));
        } else if (!addresses.some((a) => a.isDefault) && addresses.length > 0) {
          addresses[0].isDefault = true;
        }

        const updated = await updateUserProfile({ addresses });
        if (updated) {
          activeUser = updated;
          renderSavedAddresses();
          document.getElementById('address-edit-form').reset();
        }
      });
    });

    function renderSavedAddresses() {
      const container = document.getElementById('address-list-display');
      if (!activeUser.addresses || activeUser.addresses.length === 0) {
        container.innerHTML = '<p style="color:var(--text-muted); font-size:13px; font-style:italic;">No addresses saved yet.</p>';
        return;
      }

      container.innerHTML = activeUser.addresses.map((addr, index) => `
        <div class="glass" style="padding:16px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
          <div style="font-size:13px; line-height:1.6;">
            ${addr.isDefault ? '<span style="font-size:10px; font-weight:700; color:hsl(var(--primary-purple)); background:rgba(106,13,173,0.08); padding:2px 8px; border-radius:4px; margin-right:6px;">DEFAULT</span>' : ''}
            <strong>${addr.fullName}</strong> (${addr.phone})<br>
            ${addr.street}, ${addr.city}, ${addr.state} - ${addr.zipCode}
          </div>
          <div style="display:flex; gap:10px; align-items:center;">
            ${!addr.isDefault ? `<button type="button" onclick="setDefaultAddress(${index})" style="font-size:11px; font-weight:600; color:hsl(var(--primary-purple)); background:transparent; cursor:pointer; border:none;">Set Default</button>` : ''}
            <button type="button" onclick="editAddress(${index})" style="background:transparent; cursor:pointer; border:none;" title="Edit Address">
              <svg style="width:18px; height:18px; fill:hsl(var(--primary-purple));" viewBox="0 0 24 24"><path d="M20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18,2.9 17.35,2.9 16.96,3.29L15.12,5.12L18.87,8.87M3,17.25V21H6.75L17.81,9.93L14.07,6.19L3,17.25Z"/></svg>
            </button>
            <button type="button" onclick="deleteAddress(${index})" style="background:transparent; cursor:pointer; border:none;" title="Delete Address">
              <svg style="width:18px; height:18px; fill:#ef4444;" viewBox="0 0 24 24"><path d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>
            </button>
          </div>
        </div>
      `).join('');
    }

    function editAddress(index) {
      const addr = activeUser.addresses[index];
      document.getElementById('addr-name').value = addr.fullName || '';
      document.getElementById('addr-phone').value = addr.phone || '';
      document.getElementById('addr-street').value = addr.street || '';
      document.getElementById('addr-city').value = addr.city || '';
      document.getElementById('addr-state').value = addr.state || '';
      document.getElementById('addr-zip').value = addr.zipCode || '';
      document.getElementById('addr-default').checked = !!addr.isDefault;
      
      editingIndex = index;
      document.getElementById('address-submit-btn').textContent = 'Update Address';
    }

    async function setDefaultAddress(index) {
      const addresses = (activeUser.addresses || []).map((addr, i) => ({
        ...addr,
        isDefault: i === index
      }));
      const updated = await updateUserProfile({ addresses });
      if (updated) {
        activeUser = updated;
        renderSavedAddresses();
      }
    }

    async function deleteAddress(index) {
      if (!confirm('Are you sure you want to delete this address?')) return;
      const addresses = [...activeUser.addresses];
      const wasDefault = addresses[index]?.isDefault;
      addresses.splice(index, 1);
      if (wasDefault && addresses.length > 0) {
        addresses[0].isDefault = true;
      }
      const updated = await updateUserProfile({ addresses });
      if (updated) {
        activeUser = updated;
        renderSavedAddresses();
      }
    }

    async function loadHistoryOrders() {
      const container = document.getElementById('orders-list-display');
      try {
        container.innerHTML = '<div style="text-align:center; padding:30px;"><div class="spinner" style="margin:auto;"></div></div>';
        const res = await fetch('/api/orders/history', { credentials: 'same-origin' });
        const data = await res.json();
        
        if (!data.success || data.orders.length === 0) {
          container.innerHTML = '<p style="color:var(--text-muted); font-size:13px; font-style:italic;">You have not placed any orders yet.</p>';
          return;
        }

        container.innerHTML = data.orders.map(o => {
          // Compute active tracking node
          const status = o.status; // Pending, Processing, Shipped, Delivered
          const steps = ['Pending', 'Processing', 'Shipped', 'Delivered'];
          const currentIndex = steps.indexOf(status);

          return `
            <div class="glass" style="padding:24px; border-radius:12px;">
              <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px dashed var(--card-border); padding-bottom:12px; margin-bottom:16px; flex-wrap:wrap; gap:10px;">
                <div style="font-size:13px;">
                  Order ID: <strong style="color:hsl(var(--primary-purple));">${o._id}</strong><br>
                  Date: <span style="color:var(--text-muted);">${new Date(o.createdAt).toLocaleDateString('en-IN')}</span>
                </div>
                <div style="text-align:right;">
                  <span class="badge ${o.payment.status === 'Paid' ? 'badge-featured' : 'badge-new'}" style="font-size:10px; margin-bottom:4px; display:inline-block;">
                    Payment: ${o.payment.status}
                  </span><br>
                  <a href="/api/orders/${o._id}/invoice" target="_blank" style="font-size:12px; color:hsl(var(--primary-purple)); font-weight:700; text-decoration:underline;">Print Invoice</a>
                </div>
              </div>

              <!-- Tracking Timeline -->
              <div class="tracking-steps">
                ${steps.map((st, sidx) => {
                  let cls = '';
                  if (sidx < currentIndex) cls = 'completed';
                  else if (sidx === currentIndex) cls = 'active';
                  return `
                    <div style="display:flex; flex-direction:column; align-items:center; text-align:center;">
                      <div class="step-node ${cls}">${sidx < currentIndex ? '✓' : sidx + 1}</div>
                      <span style="font-size:11px; margin-top:8px; font-weight:600; color: ${sidx <= currentIndex ? 'var(--text-color)' : 'var(--text-muted)'}">${st}</span>
                    </div>
                  `;
                }).join('')}
              </div>

              <div style="margin-top:20px; font-size:13px; line-height:1.6;">
                <strong>Items ordered:</strong>
                <ul style="padding-left:20px; margin:8px 0; color:var(--text-muted);">
                  ${o.items.map(item => `
                    <li>${item.name} x ${item.quantity} (${formatPrice(item.price)} each)</li>
                  `).join('')}
                </ul>
                <div style="border-top:1px solid var(--card-border); padding-top:10px; margin-top:10px; text-align:right;">
                  Grand Total: <strong style="font-size:15px; color:hsl(var(--primary-purple));">${formatPrice(o.summary.total)}</strong>
                </div>
              </div>
            </div>
          `;
        }).join('');

      } catch (err) {
        container.innerHTML = '<p style="color:red; font-size:13px;">Error loading histories.</p>';
      }
    }

    async function renderProfileWishlist() {
      const grid = document.getElementById('profile-wishlist-grid');
      if (!grid) return;
      const items = typeof getWishlist === 'function' ? getWishlist() : [];
      if (!items.length) {
        grid.innerHTML = '<p style="color:var(--text-muted); font-size:13px; grid-column:1/-1;">Your wishlist is empty. Browse <a href="/products.html" style="color:hsl(var(--primary-purple)); font-weight:600;">products</a> to save gifts.</p>';
        return;
      }
      grid.innerHTML = items.map((item) => {
        const img = item.image || '/assets/images/default-product.webp';
        const name = (item.name || 'Gift').replace(/</g, '&lt;');
        return `
          <div class="glass" style="padding:16px; border-radius:12px; text-align:center;">
            <a href="/product-details.html?id=${item.productId}">
              <img src="${img}" alt="${name}" style="width:100%; height:140px; object-fit:cover; border-radius:8px; margin-bottom:12px;" onerror="this.src='/assets/images/default-product.webp'">
              <h4 style="font-size:14px; font-family:'Outfit'; margin-bottom:8px;">${name}</h4>
            </a>
            <p style="font-size:15px; font-weight:700; color:hsl(var(--primary-purple)); margin-bottom:12px;">${formatPrice(item.price)}</p>
            <button type="button" class="btn btn-primary" data-add-to-cart data-product-id="${item.productId}" data-product-name="${encodeURIComponent(item.name || '')}" data-product-price="${item.price}" data-product-image="${encodeURIComponent(img)}" style="width:100%; border-radius:8px; font-size:12px; padding:8px;">Add to Cart</button>
          </div>
        `;
      }).join('');
    }

    function switchProfileTab(link, panelId) {
      if (!link || !panelId) return;
      document.querySelectorAll('.profile-nav-link').forEach(l => l.classList.remove('active'));
      document.querySelectorAll('.profile-tab').forEach(p => p.classList.remove('active'));
      
      link.classList.add('active');
      const panel = document.getElementById(panelId);
      if (panel) panel.classList.add('active');
      if (panelId === 'tab-wishlist') renderProfileWishlist();
      if (panelId === 'tab-orders') loadHistoryOrders();
    }

    window.switchProfileTab = switchProfileTab;
    window.editAddress = editAddress;
    window.deleteAddress = deleteAddress;
    window.setDefaultAddress = setDefaultAddress;
  </script>
</body>
</html>
