<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Settings | MAGIZHVAGAM</title>

  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
  <style>
    .studio-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 10px;
    }
    pre {
      background: rgba(0, 0, 0, 0.2);
      padding: 12px;
      border-radius: 8px;
      margin-top: 10px;
      max-height: 250px;
      overflow: auto;
      font-family: monospace;
      font-size: 12px;
      border: 1px solid var(--card-border);
      color: var(--text-color);
    }
  </style>
</head>
<body style="visibility:hidden">
  <div class="admin-layout">
    <aside id="admin-sidebar-container"></aside>

    <main class="admin-main" style="padding: 24px !important;">
      <h1 style="font-family:'Outfit'; font-size:32px; color:var(--text-color); margin-bottom:10px;">System Settings</h1>
      <p style="color:var(--text-muted); font-size:14px; margin-bottom:20px;">Manage general store options, SEO metadata, tracking codes, payment integrations, mobile scaling, and SMTP server diagnostics.</p>

      <div class="studio-tabs">
        <button type="button" class="studio-tab-btn active" data-workspace-tab="general">General</button>
        <button type="button" class="studio-tab-btn" data-workspace-tab="seo">SEO Tags</button>
        <button type="button" class="studio-tab-btn" data-workspace-tab="analytics">Analytics</button>
        <button type="button" class="studio-tab-btn" data-workspace-tab="integrations">Integrations</button>
        <button type="button" class="studio-tab-btn" data-workspace-tab="mobile-settings">Mobile Offset</button>
        <button type="button" class="studio-tab-btn" data-workspace-tab="diagnostics">Diagnostics</button>
        <button type="button" class="studio-tab-btn" data-workspace-tab="profile">Account Profile</button>
        <button type="button" class="studio-tab-btn" data-workspace-tab="security">Security & 2FA</button>
      </div>

      <div id="workspace-container"></div>
    </main>
  </div>

  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/js/admin.js"></script>
  <script src="/assets/js/workspace-engine.js"></script>
  <script src="/assets/js/modules/settings/settings.controllers.js"></script>
  <script src="/assets/js/modules/settings/profile.controller.js"></script>
  <script src="/assets/js/modules/settings/security.controller.js"></script>
  <script src="/assets/js/modules/settings/settings.router.js"></script>
</body>
</html>
