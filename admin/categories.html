<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category Hierarchy Tree | MAGIZHVAGAM</title>
  
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">

  <style>
    .nested-cat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.01);
      margin-bottom: 8px;
      transition: all 0.2s ease;
    }
    .nested-cat-item:hover {
      background: rgba(var(--adm-accent-rgb), 0.02);
      border-color: var(--adm-accent);
    }
  </style>
</head>
<body style="visibility:hidden">

  <div class="admin-layout">
    
    <!-- Sidebar navigation -->
    <aside id="admin-sidebar-container"></aside>

    <!-- Main Categories Panel -->
    <main class="admin-main">
      <div id="admin-topbar-container"></div>
      
      <!-- Top header -->
      <section style="margin-bottom:25px;">
        <span style="font-family:'Outfit'; font-size:12px; font-weight:700; color:var(--adm-accent); text-transform:uppercase; letter-spacing:0.1em; display:block; margin-bottom:6px;">Catalogue Manager</span>
        <h1 style="font-family:'Outfit'; font-size:32px; font-weight:800; color:var(--text-color); margin:0;">Category Configurations</h1>
        <p style="color:var(--text-muted); font-size:13px; margin:4px 0 0 0;">Build nested collection paths and manage visibility settings across search listings.</p>
      </section>

      <div class="grid grid-2" style="display:grid; grid-template-columns: 1.1fr 1.3fr; gap:30px;">
        <!-- Category Creator Form -->
        <div class="glass" style="padding:25px; border-radius:12px; height:fit-content;">
          <h2 style="font-family:'Outfit'; font-size:18px; margin-top:0; margin-bottom:15px; color:var(--text-color);">Create Category</h2>
          <form id="add-category-form-prod" style="display:flex; flex-direction:column; gap:14px;">
            <div class="admin-form-group">
              <label>Category Name *</label>
              <input type="text" id="cat-name-field" class="admin-form-control" placeholder="e.g. Traditional Copper" required>
            </div>
            <div class="admin-form-group">
              <label>Parent Category (for nesting)</label>
              <select id="cat-parent-field" class="admin-form-control">
                <option value="">None (Root Category)</option>
                <!-- Loaded dynamically -->
              </select>
            </div>
            <div class="admin-form-group">
              <label>Category SEO URL Slug</label>
              <input type="text" id="cat-slug-field" class="admin-form-control" placeholder="e.g. traditional-copper">
            </div>
            <div class="admin-form-group">
              <label>Category Image</label>
              <input type="hidden" id="cat-image-field">
              <div id="cat-preview-box" style="margin-bottom:8px; border:1px dashed var(--card-border); border-radius:8px; padding:8px; display:flex; justify-content:center; align-items:center; min-height:80px; background:rgba(255,255,255,0.02); overflow:hidden;">
                <span style="color:var(--text-muted); font-size:11px;">No Image Selected</span>
              </div>
              <div style="display:flex; gap:10px;">
                <button type="button" class="btn btn-secondary" id="cat-select-btn" style="flex:1; font-size:12px; padding:8px 10px;">Choose Image</button>
                <button type="button" class="btn btn-secondary" id="cat-remove-btn" style="font-size:12px; padding:8px 10px; background:#ef4444; color:white;">Remove</button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; border-radius:8px; font-weight:700;">Create Category</button>
          </form>
        </div>

        <!-- Existing Categories Tree -->
        <div class="glass" style="padding:25px; border-radius:12px;">
          <h2 style="font-family:'Outfit'; font-size:18px; margin-top:0; margin-bottom:15px; color:var(--text-color);">Category Hierarchy Tree</h2>
          <div id="categories-list-container" style="display:flex; flex-direction:column; gap:8px; max-height:550px; overflow-y:auto; padding-right:5px;">
            <!-- Indented Categories Tree rendered by JS -->
          </div>
        </div>
      </div>
    </main>

  </div>

  <!-- Scripts -->
  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/vendor/gsap.min.js"></script>
  <script src="/assets/vendor/ScrollTrigger.min.js"></script>
  <script src="/assets/vendor/lenis.min.js"></script>
  <script src="/assets/js/media-library.js"></script>
  <script src="/assets/js/admin.js"></script>

  <script>
    // Local routing initialization
    document.addEventListener('DOMContentLoaded', () => {
      loadCategoriesList();
      loadParentCategoriesDropdown();
      window.updateAdminBreadcrumbs('Catalog', 'Categories');
    });

    // Category tree loader
    async function loadCategoriesList() {
      const container = document.getElementById('categories-list-container');
      if (!container) return;
      container.innerHTML = '<div style="text-align:center;"><div class="spinner" style="margin:auto;"></div></div>';

      try {
        const res = await adminFetch('/api/products/categories');
        const data = await res.json();
        
        if (data.success && data.categories) {
          const roots = [];
          const children = {};

          data.categories.forEach(c => {
            if (c.name.includes(' > ')) {
              const parts = c.name.split(' > ');
              const parentName = parts[0].trim();
              if (!children[parentName]) children[parentName] = [];
              children[parentName].push(c);
            } else {
              roots.push(c);
            }
          });

          let html = '';
          roots.forEach(r => {
            html += `
              <div class="nested-cat-item">
                <div style="display:flex; align-items:center; gap:10px;">
                  <img src="${r.image || '/assets/images/default-product.webp'}" style="width:36px; height:36px; object-fit:cover; border-radius:4px; border:1px solid var(--card-border);" onerror="this.src='/assets/images/default-product.webp'">
                  <div>
                    <strong style="color:var(--text-color); font-size:14px;">${r.name}</strong>
                    <div style="font-size:10px; color:var(--text-muted);">Slug: ${r.slug} • Root Category</div>
                  </div>
                </div>
                <button type="button" onclick="deleteCategoryById('${r._id}', '${r.name.replace(/'/g, "\\'")}')" class="btn" style="padding:4px 8px; font-size:10px; background:#ef4444; border:none; color:white; border-radius:4px;">Delete</button>
              </div>
            `;

            const kids = children[r.name] || [];
            kids.forEach(k => {
              const displaySubName = k.name.split(' > ').pop();
              html += `
                <div class="nested-cat-item" style="margin-left:35px; border-left: 2px dashed var(--adm-accent);">
                  <div style="display:flex; align-items:center; gap:10px;">
                    <img src="${k.image || '/assets/images/default-product.webp'}" style="width:30px; height:30px; object-fit:cover; border-radius:4px; border:1px solid var(--card-border);" onerror="this.src='/assets/images/default-product.webp'">
                    <div>
                      <strong style="color:var(--text-color); font-size:13px;">${displaySubName}</strong>
                      <div style="font-size:10px; color:var(--text-muted);">Slug: ${k.slug} • Subcategory of ${r.name}</div>
                    </div>
                  </div>
                  <button type="button" onclick="deleteCategoryById('${k._id}', '${k.name.replace(/'/g, "\\'")}')" class="btn" style="padding:4px 8px; font-size:10px; background:#ef4444; border:none; color:white; border-radius:4px;">Delete</button>
                </div>
              `;
            });
          });

          container.innerHTML = html || '<p style="color:var(--text-muted); font-size:13px;">No categories created yet.</p>';
        } else {
          container.innerHTML = '<p style="color:var(--text-muted); font-size:13px;">No categories found.</p>';
        }
      } catch (err) {
        container.innerHTML = '<p style="color:var(--adm-danger); font-size:13px;">Failed to load category tree.</p>';
      }
    }
    window.loadCategoriesList = loadCategoriesList;

    // Load parent category options
    async function loadParentCategoriesDropdown() {
      const dropdown = document.getElementById('cat-parent-field');
      if (!dropdown) return;
      
      try {
        const res = await adminFetch('/api/products/categories');
        const data = await res.json();
        if (data.success && data.categories) {
          const rootCats = data.categories.filter(c => !c.name.includes(' > '));
          dropdown.innerHTML = '<option value="">None (Root Category)</option>' + 
            rootCats.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
        }
      } catch (e) {
        console.warn('Failed to load parent dropdown:', e);
      }
    }
    window.loadParentCategoriesDropdown = loadParentCategoriesDropdown;

    // Bind category form submit
    document.getElementById('add-category-form-prod').addEventListener('submit', (e) => {
      e.preventDefault();
      const nameField = document.getElementById('cat-name-field');
      const parentField = document.getElementById('cat-parent-field');
      const slugField = document.getElementById('cat-slug-field');
      const imageField = document.getElementById('cat-image-field');
      
      let finalName = nameField.value.trim();
      if (parentField.value) {
        finalName = `${parentField.value} > ${finalName}`;
      }
      
      const payload = {
        name: finalName,
        slug: slugField.value.trim() || finalName.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, ''),
        image: imageField.value || '/assets/images/default-product.webp'
      };

      const submitBtn = e.target.querySelector('button[type="submit"]');
      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating...';
      }

      adminFetch('/api/products/categories', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          showToast('Category created successfully!', 'success');
          document.getElementById('add-category-form-prod').reset();
          updateCatPreview('');
          loadCategoriesList();
          loadParentCategoriesDropdown();
        } else {
          showToast(data.error || 'Failed to create category', 'error');
        }
      })
      .catch(() => showToast('Error creating category', 'error'))
      .finally(() => {
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create Category';
        }
      });
    });

    // Media library picker bindings
    document.getElementById('cat-select-btn').addEventListener('click', () => {
      if (window.MZMediaLibrary && typeof window.MZMediaLibrary.openPicker === 'function') {
        window.MZMediaLibrary.openPicker((asset) => {
          document.getElementById('cat-image-field').value = asset.url;
          updateCatPreview(asset.url);
          window.MZMediaLibrary.closePicker();
        });
      } else {
        const url = prompt('Enter Category Image URL:');
        if (url) {
          document.getElementById('cat-image-field').value = url;
          updateCatPreview(url);
        }
      }
    });

    document.getElementById('cat-remove-btn').addEventListener('click', () => {
      document.getElementById('cat-image-field').value = '';
      updateCatPreview('');
    });

    function updateCatPreview(url) {
      const box = document.getElementById('cat-preview-box');
      if (!box) return;
      if (url) {
        box.innerHTML = `<img src="${url}" style="max-height:100px; max-width:100%; object-fit:contain; border-radius:6px;">`;
      } else {
        box.innerHTML = `<span style="color:var(--text-muted); font-size:11px;">No Image Selected</span>`;
      }
    }

    async function deleteCategoryById(id, name) {
      if (!confirm(`Are you sure you want to delete category "${name}"? Products inside this category will remain but will have no reference category.`)) return;
      try {
        const res = await adminFetch(`/api/products/categories/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
          showToast('Category deleted successfully', 'success');
          loadCategoriesList();
          loadParentCategoriesDropdown();
        } else {
          showToast(data.error || 'Failed to delete category', 'error');
        }
      } catch (err) {
        showToast('Error deleting category', 'error');
      }
    }
    window.deleteCategoryById = deleteCategoryById;
  </script>
</body>
</html>
