<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logistics Courier Settings | MAGIZHVAGAM</title>
  
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
</head>
<body style="visibility:hidden">

  <div class="admin-layout">
    
    <!-- Sidebar navigation placeholder -->
    <aside id="admin-sidebar-container"></aside>

    <!-- Main Content Panel -->
    <main class="admin-main">
      <div id="admin-topbar-container"></div>
      
      <!-- Top header -->
      <section style="margin-bottom:25px;">
        <span style="font-family:'Outfit'; font-size:12px; font-weight:700; color:var(--adm-accent); text-transform:uppercase; letter-spacing:0.1em; display:block; margin-bottom:6px;">System Settings</span>
        <h1 style="font-family:'Outfit'; font-size:32px; font-weight:800; color:var(--text-color); margin:0;">Logistics Courier Settings</h1>
        <p style="color:var(--text-muted); font-size:13px; margin:4px 0 0 0;">Track shipping flat rates and courier API thresholds configured in system databases.</p>
      </section>

      
      <div class="glass" style="padding:25px; border-radius:12px; max-width:600px; margin:0 auto;">
        <h2 style="font-family:'Outfit'; font-size:18px; margin-top:0; margin-bottom:15px; color:var(--text-color);">Configure Global Shipping Zones</h2>
        <form id="ship-settings-form" style="display:flex; flex-direction:column; gap:14px;">
          <div class="admin-form-group">
            <label>Minimum Order Value for Free Shipping (₹) *</label>
            <input type="number" class="admin-form-control" value="1500" min="0" required>
          </div>
          <div class="admin-form-group">
            <label>Base Delivery Charge (₹) *</label>
            <input type="number" class="admin-form-control" value="80" min="0" required>
          </div>
          <button type="submit" class="btn btn-primary">Save Logistics Configuration</button>
        </form>
      </div>
    

    </main>

  </div>

  <!-- Scripts -->
  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/vendor/gsap.min.js"></script>
  <script src="/assets/vendor/ScrollTrigger.min.js"></script>
  <script src="/assets/vendor/lenis.min.js"></script>
  <script src="/assets/js/admin.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      window.updateAdminBreadcrumbs('Settings', 'Shipping');
      document.getElementById('ship-settings-form').addEventListener('submit', (e) => {
        e.preventDefault();
        showToast('Logistics flat-rates and configurations saved!', 'success');
      });
    
    });
  </script>
</body>
</html>
