<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotlight Collections | MAGIZHVAGAM</title>
  
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
</head>
<body style="visibility:hidden">

  <div class="admin-layout">
    
    <!-- Sidebar navigation placeholder -->
    <aside id="admin-sidebar-container"></aside>

    <!-- Main Content Panel -->
    <main class="admin-main">
      <div id="admin-topbar-container"></div>
      
      <!-- Top header -->
      <section style="margin-bottom:25px;">
        <span style="font-family:'Outfit'; font-size:12px; font-weight:700; color:var(--adm-accent); text-transform:uppercase; letter-spacing:0.1em; display:block; margin-bottom:6px;">Catalog Manager</span>
        <h1 style="font-family:'Outfit'; font-size:32px; font-weight:800; color:var(--text-color); margin:0;">Spotlight Collections</h1>
        <p style="color:var(--text-muted); font-size:13px; margin:4px 0 0 0;">Feature and curate specific category items dynamically on the storefront homepage slider.</p>
      </section>

      
      <div class="glass" style="padding:25px; border-radius:12px; max-width:800px; margin:0 auto;">
        <h2 style="font-family:'Outfit'; font-size:20px; margin-top:0; margin-bottom:15px; color:var(--text-color);">Curation List</h2>
        <div class="table-responsive">
          <table class="admin-table">
            <thead>
              <tr>
                <th style="width:50px;">Feature</th>
                <th>Image</th>
                <th>Collection / Category Name</th>
                <th>Slug</th>
              </tr>
            </thead>
            <tbody id="admin-collections-tbody">
              <tr><td colspan="4" style="text-align:center;"><div class="spinner" style="margin:auto;"></div></td></tr>
            </tbody>
          </table>
        </div>
        <button onclick="saveCollections()" class="btn btn-primary" style="width:100%; margin-top:20px;">Save Collections Spotlight</button>
      </div>
    

    </main>

  </div>

  <!-- Scripts -->
  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/vendor/gsap.min.js"></script>
  <script src="/assets/vendor/ScrollTrigger.min.js"></script>
  <script src="/assets/vendor/lenis.min.js"></script>
  <script src="/assets/js/admin.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      window.updateAdminBreadcrumbs('Catalog', 'Collections');
      loadCollectionsSpotlightConfig();

      async function loadCollectionsSpotlightConfig() {
        const tbody = document.getElementById('admin-collections-tbody');
        if (!tbody) return;

        try {
          const res = await adminFetch('/api/products/categories');
          const data = await res.json();
          
          if (data.success && data.categories) {
            const savedSpotlight = JSON.parse(localStorage.getItem('collections_spotlight_featured') || '[]');
            tbody.innerHTML = data.categories.map((c, index) => {
              const isChecked = savedSpotlight.includes(c._id) || (savedSpotlight.length === 0 && index < 3);
              return `
                <tr>
                  <td><input type="checkbox" class="collection-spotlight-check" value="${c._id}" ${isChecked ? 'checked' : ''} style="cursor:pointer;"></td>
                  <td>
                    <div style="width:40px; height:40px; border-radius:6px; overflow:hidden; border:1px solid var(--card-border);">
                      <img src="${c.image || '/assets/images/default-product.webp'}" style="width:100%; height:100%; object-fit:cover;">
                    </div>
                  </td>
                  <td><strong>${c.name}</strong></td>
                  <td>Slug: ${c.slug}</td>
                </tr>
              `;
            }).join('');
          } else {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:var(--text-muted);">No categories available for spotlight selection.</td></tr>';
          }
        } catch (err) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:var(--adm-danger);">Failed to load categories.</td></tr>';
        }
      }
      window.loadCollectionsSpotlightConfig = loadCollectionsSpotlightConfig;

      window.saveCollections = () => {
        const checks = document.querySelectorAll('.collection-spotlight-check:checked');
        const ids = Array.from(checks).map(cb => cb.value);
        localStorage.setItem('collections_spotlight_featured', JSON.stringify(ids));
        showToast('Spotlight collections updated successfully on storefront homepage slider!', 'success');
      };
    
    });
  </script>
</body>
</html>
