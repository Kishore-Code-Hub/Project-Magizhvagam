<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Catalogue | MAGIZHVAGAM</title>
  
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">

  <style>
    .prod-status-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .status-published { background: rgba(16, 185, 129, 0.12); color: var(--adm-success); border: 1px solid rgba(16, 185, 129, 0.2); }
  </style>
</head>
<body style="visibility:hidden">

  <div class="admin-layout">
    
    <!-- Sidebar navigation -->
    <aside id="admin-sidebar-container"></aside>

    <!-- Main Brands Panel -->
    <main class="admin-main">
      <div id="admin-topbar-container"></div>
      
      <!-- Top header -->
      <section style="margin-bottom:25px;">
        <span style="font-family:'Outfit'; font-size:12px; font-weight:700; color:var(--adm-accent); text-transform:uppercase; letter-spacing:0.1em; display:block; margin-bottom:6px;">Catalogue Manager</span>
        <h1 style="font-family:'Outfit'; font-size:32px; font-weight:800; color:var(--text-color); margin:0;">Artisan Brand Partners</h1>
        <p style="color:var(--text-muted); font-size:13px; margin:4px 0 0 0;">Manage local Tamil artisans, display description details, and configure marketplace logos.</p>
      </section>

      <div class="grid grid-2" style="display:grid; grid-template-columns: 1fr 1.3fr; gap:30px;">
        <!-- Brand Creator Form -->
        <div class="glass" style="padding:25px; border-radius:12px; height:fit-content;">
          <h2 style="font-family:'Outfit'; font-size:18px; margin-top:0; margin-bottom:15px; color:var(--text-color);">Add Brand Partner</h2>
          <form id="add-brand-form" style="display:flex; flex-direction:column; gap:14px;">
            <div class="admin-form-group">
              <label>Brand Name *</label>
              <input type="text" id="brand-name" class="admin-form-control" placeholder="e.g. Tanjore Crafts Co." required>
            </div>
            <div class="admin-form-group">
              <label>Brand Description</label>
              <textarea id="brand-desc" class="admin-form-control" rows="3" placeholder="Brief history/details about the local brand artisans..."></textarea>
            </div>
            <div class="admin-form-group">
              <label>Brand Logo URL</label>
              <input type="text" id="brand-logo" class="admin-form-control" placeholder="/assets/images/brands/tanjore.png">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; border-radius:8px; font-weight:700;">Save Brand Partner</button>
          </form>
        </div>

        <!-- Existing Brands Panel -->
        <div class="glass" style="padding:25px; border-radius:12px;">
          <h2 style="font-family:'Outfit'; font-size:18px; margin-top:0; margin-bottom:15px; color:var(--text-color);">Active Brand Catalog</h2>
          <div class="table-responsive">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Logo</th>
                  <th>Brand Name</th>
                  <th>Description</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="brands-list-tbody">
                <!-- Rendered dynamically -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

  </div>

  <!-- Scripts -->
  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/vendor/gsap.min.js"></script>
  <script src="/assets/vendor/ScrollTrigger.min.js"></script>
  <script src="/assets/vendor/lenis.min.js"></script>
  <script src="/assets/js/admin.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderBrandsList();
      window.updateAdminBreadcrumbs('Catalog', 'Brands');
    });

    let mockBrands = [
      { id: 'BRD-01', name: 'Tanjore Art Plate Guild', desc: 'Handcrafted signature brass plates from Tanjavur local craft houses.', logo: '/assets/images/brands/tanjore.png', status: 'Active' },
      { id: 'BRD-02', name: 'Coimbatore Clay Pottery Works', desc: 'Terracotta clay jars and customized return gift craft kits.', logo: '/assets/images/brands/clay.png', status: 'Active' },
      { id: 'BRD-03', name: 'Madurai Flower Basket Guild', desc: 'Specialized organic floral decoration hampers and scented baskets.', logo: '/assets/images/brands/madurai.png', status: 'Active' }
    ];

    function renderBrandsList() {
      const tbody = document.getElementById('brands-list-tbody');
      if (!tbody) return;

      tbody.innerHTML = mockBrands.map(b => `
        <tr>
          <td><div style="width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:center; border:1px solid var(--card-border); font-weight:bold; font-size:12px;">${b.name[0]}</div></td>
          <td><strong>${b.name}</strong></td>
          <td style="font-size:12px; color:var(--text-muted); max-width:220px; text-overflow:ellipsis; overflow:hidden; white-space:nowrap;">${b.desc}</td>
          <td><span class="prod-status-badge status-published">${b.status}</span></td>
          <td>
            <button onclick="deleteBrand('${b.id}')" class="btn btn-secondary" style="padding:4px 8px; font-size:10px; border:none; background:#ef4444; color:white; border-radius:4px;">Delete</button>
          </td>
        </tr>
      `).join('');
    }
    window.renderBrandsList = renderBrandsList;

    function deleteBrand(id) {
      mockBrands = mockBrands.filter(b => b.id !== id);
      showToast('Brand partner removed!', 'success');
      renderBrandsList();
    }
    window.deleteBrand = deleteBrand;

    document.getElementById('add-brand-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('brand-name').value.trim();
      const desc = document.getElementById('brand-desc').value.trim() || 'No description provided';
      const logo = document.getElementById('brand-logo').value.trim() || '';
      
      mockBrands.push({
        id: 'BRD-' + Math.floor(10 + Math.random() * 90),
        name,
        desc,
        logo,
        status: 'Active'
      });

      showToast('Brand registered successfully!', 'success');
      document.getElementById('add-brand-form').reset();
      renderBrandsList();
    });
  </script>
</body>
</html>
