<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>General Store Configuration | MAGIZHVAGAM</title>
  
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
</head>
<body style="visibility:hidden">

  <div class="admin-layout">
    
    <!-- Sidebar navigation placeholder -->
    <aside id="admin-sidebar-container"></aside>

    <!-- Main Content Panel -->
    <main class="admin-main">
      <div id="admin-topbar-container"></div>
      
      <!-- Top header -->
      <section style="margin-bottom:25px;">
        <span style="font-family:'Outfit'; font-size:12px; font-weight:700; color:var(--adm-accent); text-transform:uppercase; letter-spacing:0.1em; display:block; margin-bottom:6px;">System Settings</span>
        <h1 style="font-family:'Outfit'; font-size:32px; font-weight:800; color:var(--text-color); margin:0;">General Store Configuration</h1>
        <p style="color:var(--text-muted); font-size:13px; margin:4px 0 0 0;">Update Magizhvagam store address, currency preferences, tax identification details, and invoicing contact numbers.</p>
      </section>

      
      <div class="glass" style="padding:25px; border-radius:12px; max-width:600px; margin:0 auto;">
        <h2 style="font-family:'Outfit'; font-size:18px; margin-top:0; margin-bottom:15px; color:var(--text-color);">Store Profile Info</h2>
        <form id="store-profile-form" style="display:flex; flex-direction:column; gap:14px;">
          <div class="admin-form-group">
            <label>Legal Store Name *</label>
            <input type="text" class="admin-form-control" value="Magizhvagam Gifting Crafts" required>
          </div>
          <div class="admin-form-group">
            <label>Business Address *</label>
            <textarea class="admin-form-control" rows="3" required>No. 42 Traditional Craft Lane, Mylapore, Chennai, Tamil Nadu — 600004</textarea>
          </div>
          <div class="grid grid-2" style="gap:10px;">
            <div class="admin-form-group">
              <label>Invoicing Currency *</label>
              <input type="text" class="admin-form-control" value="INR (₹)" readonly>
            </div>
            <div class="admin-form-group">
              <label>Business Tax ID (GSTIN)</label>
              <input type="text" class="admin-form-control" value="33AAAAA1111A1Z1">
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Save Profile Settings</button>
        </form>
      </div>
    

    </main>

  </div>

  <!-- Scripts -->
  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/vendor/gsap.min.js"></script>
  <script src="/assets/vendor/ScrollTrigger.min.js"></script>
  <script src="/assets/vendor/lenis.min.js"></script>
  <script src="/assets/js/admin.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      window.updateAdminBreadcrumbs('Settings', 'Store');
      document.getElementById('store-profile-form').addEventListener('submit', (e) => {
        e.preventDefault();
        showToast('Store settings saved successfully!', 'success');
      });
    
    });
  </script>
</body>
</html>
