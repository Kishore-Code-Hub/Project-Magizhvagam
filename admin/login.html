<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal Login | MAGIZHVAGAM</title>
  
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
  
  <style>
    body {
      background: radial-gradient(circle at 10% 20%, rgba(106, 13, 173, 0.08) 0%, rgba(21, 15, 41, 0.05) 90.1%), #FAF9F6;
      color: #0F172A;
      font-family: 'Outfit', 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    
    .admin-login-container {
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.4s ease-out;
    }
    
    .admin-logo-header {
      text-align: center;
      margin-bottom: 35px;
    }
    
    .admin-logo-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 2.5px;
      margin: 0 0 6px;
      background: linear-gradient(135deg, #6a0dad 0%, #5a0a95 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .admin-logo-subtitle {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #64748b;
      font-weight: 700;
    }
    
    .admin-login-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(106, 13, 173, 0.08);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(106, 13, 173, 0.04);
    }
    
    .admin-login-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 25px;
      text-align: center;
      color: #0F172A;
    }
    
    .form-group {
      margin-bottom: 22px;
    }
    
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .form-control {
      width: 100%;
      padding: 12px 16px;
      font-size: 14px;
      border: 1px solid rgba(106, 13, 173, 0.12);
      border-radius: 10px;
      background-color: #fff;
      color: #0F172A;
      outline: none;
      transition: all 0.25s ease;
      box-sizing: border-box;
    }
    
    .form-control:focus {
      border-color: #6a0dad;
      box-shadow: 0 0 0 3px rgba(106, 13, 173, 0.1);
    }
    
    .btn-admin {
      width: 100%;
      padding: 14px;
      font-size: 14px;
      font-weight: 700;
      background: linear-gradient(135deg, #6a0dad 0%, #5a0a95 100%);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-top: 15px;
      box-shadow: 0 4px 12px rgba(106, 13, 173, 0.15);
    }
    
    .btn-admin:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(106, 13, 173, 0.25);
    }
    
    .btn-admin:disabled {
      background: #94a3b8;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .error-box {
      background-color: #fef2f2;
      border: 1px solid #fee2e2;
      color: #ef4444;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
      font-weight: 600;
      text-align: center;
      line-height: 1.5;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="admin-login-container">
    <div class="admin-logo-header">
      <h1 class="admin-logo-title">MAGIZHVAGAM</h1>
      <span class="admin-logo-subtitle">Administrative Portal</span>
    </div>
    
    <div class="admin-login-card">
      <h2 class="admin-login-title" id="card-title">Sign In</h2>
      
      <div id="error-message" class="error-box"></div>
      
      <form id="admin-login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="admin@magizhvagam.com" required autocomplete="username">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
        
        <button type="submit" id="submit-btn" class="btn-admin">Login to Dashboard</button>
      </form>

      <!-- 2FA Form -->
      <form id="admin-2fa-form" style="display:none;">
        <p style="font-size:12px; color:#64748b; margin-bottom:20px; line-height:1.5; text-align:center;">Two-factor authentication is active on this account. Enter the 6-digit verification code from your authenticator app, or a backup recovery code.</p>
        <div class="form-group">
          <label class="form-label" for="otp-code">Authentication Code</label>
          <input type="text" id="otp-code" class="form-control" placeholder="000000 / XXXX-XXXX" style="text-align:center; font-size:16px; letter-spacing:1px;" required autocomplete="one-time-code">
        </div>
        <div class="form-group" style="display:flex; align-items:center; gap:8px; margin-bottom:15px;">
          <input type="checkbox" id="remember-device" style="width:16px; height:16px; cursor:pointer;">
          <label for="remember-device" style="font-size:12px; color:#64748b; cursor:pointer; font-weight:600; user-select:none; margin:0;">Remember this device for 30 days</label>
        </div>
        <button type="submit" id="verify-btn" class="btn-admin">Verify & Access</button>
        <div style="text-align:center; margin-top:15px;">
          <a href="#" id="back-to-login-link" style="font-size:12px; color:#6a0dad; text-decoration:none; font-weight:600;">Back to Sign In</a>
        </div>
      </form>
    </div>
  </div>

  <!-- Shared Toast Layer Dynamic Injector -->
  <script src="/assets/js/app.js"></script>
  <script>
    let temp2FAToken = '';

    // Primary login form submit
    document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorBox = document.getElementById('error-message');
      const submitBtn = document.getElementById('submit-btn');
      
      errorBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Verifying account...';
      
      try {
        const res = await fetch('/api/auth/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        let data;
        try {
          data = await res.json();
        } catch (parseErr) {
          errorBox.textContent = 'Server returned an invalid response.';
          errorBox.style.display = 'block';
          return;
        }

        if (data.success) {
          if (data.require2FA) {
            // Store temp token and switch view
            temp2FAToken = data.tempToken;
            document.getElementById('admin-login-form').style.display = 'none';
            document.getElementById('admin-2fa-form').style.display = 'block';
            document.getElementById('card-title').textContent = 'Two-Factor Verification';
            document.getElementById('otp-code').focus();
            showToast('Two-Factor code required.', 'info');
          } else if (data.user && data.user.role === 'admin') {
            localStorage.setItem("adminAuth", "true");
            if (typeof window.setSessionUser === 'function') {
              window.setSessionUser(data.user);
            }
            showToast('Verification successful! Access granted.', 'success');
            
            setTimeout(() => {
              const urlParams = new URLSearchParams(window.location.search);
              const redirect = urlParams.get('redirect') || 'admin/dashboard.html';
              window.location.replace('/' + redirect);
            }, 1000);
          } else {
            errorBox.textContent = 'Access denied. Administrator account required.';
            errorBox.style.display = 'block';
          }
        } else {
          let errText = 'Access denied. Administrator account required.';
          if (res.status === 401) errText = 'Invalid administrative credentials.';
          else if (data.error) errText = data.error;
          
          errorBox.textContent = errText;
          errorBox.style.display = 'block';
        }
      } catch (err) {
        errorBox.textContent = 'Server connection error. Please try again.';
        errorBox.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Login to Dashboard';
      }
    });

    // 2FA Verification form submit
    document.getElementById('admin-2fa-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const code = document.getElementById('otp-code').value.trim();
      const rememberDevice = document.getElementById('remember-device').checked;
      const errorBox = document.getElementById('error-message');
      const verifyBtn = document.getElementById('verify-btn');

      errorBox.style.display = 'none';
      verifyBtn.disabled = true;
      verifyBtn.textContent = 'Verifying code...';

      try {
        const res = await fetch('/api/auth/admin/verify-2fa', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tempToken: temp2FAToken, code, rememberDevice })
        });

        const data = await res.json();
        if (data.success && data.user && data.user.role === 'admin') {
          localStorage.setItem("adminAuth", "true");
          if (typeof window.setSessionUser === 'function') {
            window.setSessionUser(data.user);
          }
          showToast('Verification successful! Access granted.', 'success');
          
          setTimeout(() => {
            const urlParams = new URLSearchParams(window.location.search);
            const redirect = urlParams.get('redirect') || 'admin/dashboard.html';
            window.location.replace('/' + redirect);
          }, 1000);
        } else {
          errorBox.textContent = data.error || 'Verification failed. Try again.';
          errorBox.style.display = 'block';
        }
      } catch (err) {
        errorBox.textContent = 'Server connection error. Please try again.';
        errorBox.style.display = 'block';
      } finally {
        verifyBtn.disabled = false;
        verifyBtn.textContent = 'Verify & Access';
      }
    });

    // Back to Login link
    document.getElementById('back-to-login-link').addEventListener('click', (e) => {
      e.preventDefault();
      temp2FAToken = '';
      document.getElementById('admin-2fa-form').style.display = 'none';
      document.getElementById('admin-login-form').style.display = 'block';
      document.getElementById('card-title').textContent = 'Sign In';
      document.getElementById('error-message').style.display = 'none';
    });
  </script>
</body>
</html>
