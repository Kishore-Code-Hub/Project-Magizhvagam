<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database System Backups | MAGIZHVAGAM</title>
  
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
</head>
<body style="visibility:hidden">

  <div class="admin-layout">
    
    <!-- Sidebar navigation placeholder -->
    <aside id="admin-sidebar-container"></aside>

    <!-- Main Content Panel -->
    <main class="admin-main">
      <div id="admin-topbar-container"></div>
      
      <!-- Top header -->
      <section style="margin-bottom:25px;">
        <span style="font-family:'Outfit'; font-size:12px; font-weight:700; color:var(--adm-accent); text-transform:uppercase; letter-spacing:0.1em; display:block; margin-bottom:6px;">System Settings</span>
        <h1 style="font-family:'Outfit'; font-size:32px; font-weight:800; color:var(--text-color); margin:0;">Database System Backups</h1>
        <p style="color:var(--text-muted); font-size:13px; margin:4px 0 0 0;">Configure database SQL backup scheduler, download database dumps, or check system configurations.</p>
      </section>

      
      <div class="grid grid-2" style="display:grid; grid-template-columns:1fr 1fr; gap:30px;">
        <div class="glass" style="padding:25px; border-radius:12px;">
          <h2 style="font-family:'Outfit'; font-size:18px; margin-top:0; margin-bottom:15px; color:var(--text-color);">SQL Database Dump</h2>
          <p style="font-size:12px; color:var(--text-muted); margin-bottom:20px;">Download direct snapshots of the PostgreSQL database schemas and verify seed integrity.</p>
          <button onclick="triggerBackupsSql()" class="btn btn-primary" style="width:100%;">Create Backup Point</button>
        </div>

        <div class="glass" style="padding:25px; border-radius:12px;">
          <h2 style="font-family:'Outfit'; font-size:18px; margin-top:0; margin-bottom:15px; color:var(--text-color);">Backup History Points</h2>
          <ul id="backups-list-container" style="list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:10px;">
            <tr><td style="text-align:center;"><div class="spinner" style="margin:auto;"></div></td></tr>
          </ul>
        </div>
      </div>
    

    </main>

  </div>

  <!-- Scripts -->
  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/vendor/gsap.min.js"></script>
  <script src="/assets/vendor/ScrollTrigger.min.js"></script>
  <script src="/assets/vendor/lenis.min.js"></script>
  <script src="/assets/js/admin.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      window.updateAdminBreadcrumbs('Settings', 'Backups');
      loadBackups();

      async function loadBackups() {
        const container = document.getElementById('backups-list-container');
        if (!container) return;
        container.innerHTML = '<li style="text-align:center; padding:10px;"><div class="spinner" style="margin:auto;"></div></li>';

        try {
          const res = await adminFetch('/api/admin/system/backup');
          const data = await res.json();
          if (data.success && data.backups) {
            if (data.backups.length === 0) {
              container.innerHTML = '<li style="color:var(--text-muted); font-size:13px; text-align:center; padding:20px;">No backup points found.</li>';
              return;
            }
            container.innerHTML = data.backups.map(b => `
              <li class="glass" style="padding:12px; border-radius:6px; display:flex; justify-content:space-between; align-items:center;">
                <div>
                  <strong>${b.filename}</strong>
                  <div style="font-size:10px; color:var(--text-muted);">Size: ${b.size} • Created: ${new Date(b.createdAt).toLocaleString('en-IN')}</div>
                </div>
                <div style="display:flex; align-items:center; gap:8px;">
                  <span class="badge badge-success">Restorable</span>
                  <button onclick="deleteBackupFile('${b.filename}')" class="btn" style="background:#ef4444 !important; color:white; border:none; padding:6px 12px; font-size:11px; border-radius:6px; cursor:pointer;">Delete</button>
                </div>
              </li>
            `).join('');
          } else {
            container.innerHTML = '<li style="color:var(--adm-danger); text-align:center; padding:10px;">Failed to load backup history.</li>';
          }
        } catch (err) {
          container.innerHTML = '<li style="color:var(--adm-danger); text-align:center; padding:10px;">Connection error loading backups.</li>';
        }
      }
      window.loadBackups = loadBackups;

      window.triggerBackupsSql = async () => {
        showToast('Compiling SQL database schema backup snapshot...', 'info');
        try {
          const res = await adminFetch('/api/admin/system/backup', { method: 'POST' });
          const data = await res.json();
          if (data.success) {
            showToast('PostgreSQL SQL Schema Backup successfully created!', 'success');
            loadBackups();
          } else {
            showToast(data.error || 'Failed to write SQL backup', 'error');
          }
        } catch (e) {
          showToast('Connection error during backup', 'error');
        }
      };

      window.deleteBackupFile = async (filename) => {
        if (!confirm(`Are you sure you want to permanently delete backup point: ${filename}?`)) return;
        try {
          const res = await adminFetch(`/api/admin/system/backup/${filename}`, { method: 'DELETE' });
          const data = await res.json();
          if (data.success) {
            showToast('Backup point deleted!', 'success');
            loadBackups();
          } else {
            showToast(data.error || 'Failed to delete backup file', 'error');
          }
        } catch (e) {
          showToast('Connection error during deletion', 'error');
        }
      };
    
    });
  </script>
</body>
</html>
