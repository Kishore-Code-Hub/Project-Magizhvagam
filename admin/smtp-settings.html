<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMTP Server Config | MAGIZHVAGAM</title>
  
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
</head>
<body style="visibility:hidden">

  <div class="admin-layout">
    
    <!-- Sidebar navigation placeholder -->
    <aside id="admin-sidebar-container"></aside>

    <!-- Main Content Panel -->
    <main class="admin-main">
      <div id="admin-topbar-container"></div>
      
      <!-- Top header -->
      <section style="margin-bottom:25px;">
        <span style="font-family:'Outfit'; font-size:12px; font-weight:700; color:var(--adm-accent); text-transform:uppercase; letter-spacing:0.1em; display:block; margin-bottom:6px;">System Coordinates</span>
        <h1 style="font-family:'Outfit'; font-size:32px; font-weight:800; color:var(--text-color); margin:0;">SMTP Server Config</h1>
        <p style="color:var(--text-muted); font-size:13px; margin:4px 0 0 0;">Configure email server host, port, credentials, and send diagnostic tests.</p>
      </section>

      

      <div class="glass" style="max-width:650px; padding:25px; border-radius:12px; margin:0 auto;">
        <h3 style="font-family:'Outfit'; font-size:20px; color:var(--text-color); margin-top:0; margin-bottom:20px;">Email Server Configuration</h3>
        <form id="smtp-settings-form" onsubmit="event.preventDefault();">
          <div class="grid grid-2" style="gap:15px;">
            <div class="admin-form-group">
              <label>SMTP Host *</label>
              <input type="text" id="set-smtp-host" class="admin-form-control" required>
            </div>
            <div class="admin-form-group">
              <label>SMTP Port *</label>
              <input type="number" id="set-smtp-port" class="admin-form-control" required>
            </div>
          </div>
          <div class="admin-form-group">
            <label>SMTP User / Email *</label>
            <input type="email" id="set-smtp-user" class="admin-form-control" required>
          </div>
          <button id="save-smtp-settings-btn" type="button" class="btn btn-primary" style="width:100%; border-radius:8px;">Save SMTP Setup</button>
        </form>
      </div>
    
    

    </main>

  </div>

  <!-- Scripts -->
  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/vendor/gsap.min.js"></script>
  <script src="/assets/vendor/ScrollTrigger.min.js"></script>
  <script src="/assets/vendor/lenis.min.js"></script>
  <script src="/assets/js/admin.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      

      window.updateAdminBreadcrumbs('Settings', 'SMTP Settings');
      
      document.getElementById('set-smtp-host').value = localStorage.getItem('settings_smtp_host') || 'smtp.gmail.com';
      document.getElementById('set-smtp-port').value = localStorage.getItem('settings_smtp_port') || '587';
      document.getElementById('set-smtp-user').value = localStorage.getItem('settings_smtp_user') || 'hellomagizhvagam@gmail.com';

      document.getElementById('save-smtp-settings-btn').addEventListener('click', () => {
        localStorage.setItem('settings_smtp_host', document.getElementById('set-smtp-host').value.trim());
        localStorage.setItem('settings_smtp_port', document.getElementById('set-smtp-port').value.trim());
        localStorage.setItem('settings_smtp_user', document.getElementById('set-smtp-user').value.trim());
        showToast('SMTP credentials settings updated successfully!', 'success');
      });
    
    
    });
  </script>
</body>
</html>
