<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appearance Studio | MAGIZHVAGAM</title>

  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/appearance-studio.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">

  <style>
    .admin-main {
      padding: 0 !important;
      height: 100vh;
      overflow: hidden;
      background-color: var(--studio-bg) !important;
    }
    .preset-option-card {
      transition: all 0.2s ease;
      border: 1px solid var(--studio-border);
      background: rgba(255, 255, 255, 0.02);
    }
    .preset-option-card:hover {
      border-color: var(--studio-gold);
      background: rgba(255, 255, 255, 0.04);
      transform: translateY(-2px);
    }
    .preset-option-card.active {
      border-color: var(--studio-gold);
      background: rgba(201, 145, 61, 0.08);
      box-shadow: 0 0 10px rgba(201, 145, 61, 0.2);
    }
    .scroll-panel {
      overflow-y: auto;
      max-height: calc(100vh - 200px);
      padding-right: 6px;
      padding-bottom: 20px;
    }
    .scroll-panel::-webkit-scrollbar {
      width: 6px;
    }
    .scroll-panel::-webkit-scrollbar-thumb {
      background: var(--studio-border);
      border-radius: 3px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 15px;
    }
    .studio-tabs {
      display: flex;
      overflow-x: auto;
      border-bottom: 1px solid var(--studio-border);
      scrollbar-width: thin;
      background-color: rgba(0, 0, 0, 0.2);
      padding: 0 10px;
    }
    .studio-tabs::-webkit-scrollbar {
      height: 4px;
    }
    .studio-tabs::-webkit-scrollbar-thumb {
      background: var(--studio-border);
      border-radius: 2px;
    }
  </style>
</head>
<body style="visibility:hidden">
  <div class="admin-layout">
    <!-- Sidebar navigation placeholder -->
    <aside id="admin-sidebar-container"></aside>

    <!-- Main Appearance Studio Container -->
    <main class="admin-main">
      <div class="studio-container">
        
        <!-- Left: Theme Editor Panel -->
        <div class="studio-sidebar">
          <div class="studio-header">
            <h1>Appearance Studio</h1>
            <p>Design your store look, feel, and colors live.</p>
          </div>

          <!-- Tabs Navigation Scrollable Row -->
          <div class="studio-tabs">
            <button type="button" class="studio-tab-btn active" data-workspace-tab="presets">Presets</button>
            <button type="button" class="studio-tab-btn" data-workspace-tab="colors">Colors</button>
            <button type="button" class="studio-tab-btn" data-workspace-tab="typography">Fonts</button>
            <button type="button" class="studio-tab-btn" data-workspace-tab="header">Header</button>
            <button type="button" class="studio-tab-btn" data-workspace-tab="footer">Footer Settings</button>
            <button type="button" class="studio-tab-btn" data-workspace-tab="buttons">Buttons</button>
            <button type="button" class="studio-tab-btn" data-workspace-tab="cards">Cards</button>
            <button type="button" class="studio-tab-btn" data-workspace-tab="products">Product Pages</button>
            <button type="button" class="studio-tab-btn" data-workspace-tab="mobile">Mobile Settings</button>
            <button type="button" class="studio-tab-btn" data-workspace-tab="animations">Animations</button>
            <button type="button" class="studio-tab-btn" data-workspace-tab="glass">Glassmorphism</button>
            <button type="button" class="studio-tab-btn" data-workspace-tab="css">Custom CSS</button>
          </div>

          <!-- Main Configuration Form -->
          <form id="homepage-builder-form" style="display:flex; flex-direction:column; flex-grow:1; overflow:hidden;">
            <!-- Workspace Mount Point -->
            <div id="workspace-container" class="studio-content scroll-panel"></div>

            <!-- Editor Action Bar -->
            <div class="studio-actions">
              <span id="studio-unsaved-indicator" style="display:none; font-size:11px; color:var(--studio-gold); margin-right:auto;">Unsaved changes</span>
              <div id="studio-save-status" class="studio-save-status" style="display:none;"></div>
              <button type="button" class="studio-btn studio-btn-secondary" style="padding: 10px 14px; font-size: 11px;">Restore Last Saved</button>
              <button type="button" class="studio-btn studio-btn-danger" style="padding: 10px 14px; font-size: 11px;">Reset Defaults</button>
              <button type="submit" id="save-settings-submit-btn" class="studio-btn studio-btn-primary" style="padding: 10px 18px; font-size: 12px; font-weight: 700;">Save Theme Settings</button>
            </div>
          </form>
        </div>

        <!-- Right: Viewport Live Preview Iframe -->
        <div class="studio-viewport-panel">
          <div class="viewport-toolbar">
            <div class="viewport-device-toggles">
              <button type="button" class="device-btn active" id="btn-device-desktop">🖥️ Desktop</button>
              <button type="button" class="device-btn" id="btn-device-tablet">📟 Tablet</button>
              <button type="button" class="device-btn" id="btn-device-mobile">📱 Mobile</button>
            </div>
            
            <div class="viewport-route-selector">
              <label>Preview Page:</label>
              <select class="viewport-route-select">
                <option value="/index.html">Homepage</option>
                <option value="/products.html">Catalog</option>
                <option value="/about.html">About Us</option>
                <option value="/contact.html">Contact Us</option>
              </select>
            </div>
          </div>
          
          <div class="viewport-frame-container">
            <iframe id="viewport-iframe" class="viewport-iframe desktop" src="/index.html"></iframe>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/contrast-engine.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/js/media-library.js"></script>
  <script src="/assets/js/admin.js"></script>
  <script src="/assets/js/workspace-engine.js"></script>
  
  <!-- Appearance Studio Modules Empty Controllers -->
  <script src="/assets/js/modules/appearance/theme-store.js"></script>
  <script src="/assets/js/modules/appearance/presets.controller.js"></script>
  <script src="/assets/js/modules/appearance/colors.controller.js"></script>
  <script src="/assets/js/modules/appearance/typography.controller.js"></script>
  <script src="/assets/js/modules/appearance/header.controller.js"></script>
  <script src="/assets/js/modules/appearance/footer.controller.js"></script>
  <script src="/assets/js/modules/appearance/buttons.controller.js"></script>
  <script src="/assets/js/modules/appearance/cards.controller.js"></script>
  <script src="/assets/js/modules/appearance/products.controller.js"></script>
  <script src="/assets/js/modules/appearance/mobile.controller.js"></script>
  <script src="/assets/js/modules/appearance/animations.controller.js"></script>
  <script src="/assets/js/modules/appearance/glass.controller.js"></script>
  <script src="/assets/js/modules/appearance/css.controller.js"></script>
  
  <!-- Appearance Router registry -->
  <script src="/assets/js/modules/appearance/appearance.router.js"></script>
</body>
</html>
