<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Alerts Studio | MAGIZHVAGAM</title>
  
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
</head>
<body style="visibility:hidden">

  <div class="admin-layout">
    
    <!-- Sidebar navigation placeholder -->
    <aside id="admin-sidebar-container"></aside>

    <!-- Main Content Panel -->
    <main class="admin-main">
      <div id="admin-topbar-container"></div>
      
      <!-- Top header -->
      <section style="margin-bottom:25px;">
        <span style="font-family:'Outfit'; font-size:12px; font-weight:700; color:var(--adm-accent); text-transform:uppercase; letter-spacing:0.1em; display:block; margin-bottom:6px;">Marketing Studio</span>
        <h1 style="font-family:'Outfit'; font-size:32px; font-weight:800; color:var(--text-color); margin:0;">WhatsApp Alerts Studio</h1>
        <p style="color:var(--text-muted); font-size:13px; margin:4px 0 0 0;">Design and send order updates, tracking IDs, and customized promotions using WhatsApp Business API.</p>
      </section>

      
      <div class="glass" style="padding:25px; border-radius:12px; max-width:600px; margin:0 auto;">
        <h2 style="font-family:'Outfit'; font-size:18px; margin-top:0; margin-bottom:15px; color:var(--text-color);">WhatsApp Business Template Customizer</h2>
        <form id="wa-form" style="display:flex; flex-direction:column; gap:14px;">
          <div class="admin-form-group">
            <label>Template Identifier *</label>
            <input type="text" class="admin-form-control" value="order_dispatch_alert" readonly>
          </div>
          <div class="admin-form-group">
            <label>Template Message Text *</label>
            <textarea class="admin-form-control" rows="4" readonly>Hello {{1}}, your Magizhvagam order #{{2}} has been dispatched via {{3}}. Tracking link: {{4}}. Thank you for supporting Tamil artisans!</textarea>
          </div>
          <div class="admin-form-group">
            <label>Test Phone Number (with Country Code) *</label>
            <input type="text" class="admin-form-control" placeholder="+919876543210" required>
          </div>
          <button type="submit" class="btn btn-primary">Send Test WhatsApp Message</button>
        </form>
      </div>
    

    </main>

  </div>

  <!-- Scripts -->
  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/vendor/gsap.min.js"></script>
  <script src="/assets/vendor/ScrollTrigger.min.js"></script>
  <script src="/assets/vendor/lenis.min.js"></script>
  <script src="/assets/js/admin.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      window.updateAdminBreadcrumbs('Marketing', 'WhatsApp Studio');
      document.getElementById('wa-form').addEventListener('submit', (e) => {
        e.preventDefault();
        showToast('Test WhatsApp business message dispatched successfully!', 'success');
      });
    
    });
  </script>
</body>
</html>
