<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refunds & Wallet Settlements | MAGIZHVAGAM</title>
  
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
</head>
<body style="visibility:hidden">

  <div class="admin-layout">
    
    <!-- Sidebar navigation placeholder -->
    <aside id="admin-sidebar-container"></aside>

    <!-- Main Content Panel -->
    <main class="admin-main">
      <div id="admin-topbar-container"></div>
      
      <!-- Top header -->
      <section style="margin-bottom:25px;">
        <span style="font-family:'Outfit'; font-size:12px; font-weight:700; color:var(--adm-accent); text-transform:uppercase; letter-spacing:0.1em; display:block; margin-bottom:6px;">Sales Operations</span>
        <h1 style="font-family:'Outfit'; font-size:32px; font-weight:800; color:var(--text-color); margin:0;">Refunds & Wallet Settlements</h1>
        <p style="color:var(--text-muted); font-size:13px; margin:4px 0 0 0;">Dispatch payouts to bank accounts/wallets for cancelled orders and manage credits database logs.</p>
      </section>

      
      <div class="grid grid-2" style="display:grid; grid-template-columns:1fr 1.3fr; gap:30px;">
        <div class="glass" style="padding:25px; border-radius:12px; height:fit-content;">
          <h2 style="font-family:'Outfit'; font-size:18px; margin-top:0; margin-bottom:15px; color:var(--text-color);">Process Manual Refund</h2>
          <form id="refund-form" style="display:flex; flex-direction:column; gap:14px;">
            <div class="admin-form-group">
              <label>Select Cancelled Order ID *</label>
              <select id="refund-order-id" class="admin-form-control" required>
                <option value="">Choose order...</option>
                <option value="ORD-90832">ORD-90832 (₹2,450)</option>
                <option value="ORD-90422">ORD-90422 (₹1,200)</option>
              </select>
            </div>
            <div class="admin-form-group">
              <label>Refund Channel *</label>
              <select id="refund-channel" class="admin-form-control" required>
                <option value="wallet">Customer Gift Wallet</option>
                <option value="source">Original Payment Gateway</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary">Process Refund</button>
          </form>
        </div>

        <div class="glass table-responsive" style="padding:25px; border-radius:12px;">
          <h2 style="font-family:'Outfit'; font-size:18px; margin-top:0; margin-bottom:15px; color:var(--text-color);">Refund Transactions Logs</h2>
          <table class="admin-table">
            <thead>
              <tr>
                <th>Refund ID</th>
                <th>Order ID</th>
                <th>Channel</th>
                <th>Refunded Amount</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="refunds-ledger-tbody">
              <tr>
                <td><code>REF-90831</code></td>
                <td><strong>#ORD-90832</strong></td>
                <td>Source Gateway</td>
                <td><strong>₹2,450</strong></td>
                <td><span class="badge badge-success">Settled</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    

    </main>

  </div>

  <!-- Scripts -->
  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/vendor/gsap.min.js"></script>
  <script src="/assets/vendor/ScrollTrigger.min.js"></script>
  <script src="/assets/vendor/lenis.min.js"></script>
  <script src="/assets/js/admin.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      window.updateAdminBreadcrumbs('Sales', 'Refunds');
      document.getElementById('refund-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const ord = document.getElementById('refund-order-id').value;
        if (!ord) return;
        showToast('Refund processed successfully! Notification dispatched to customer.', 'success');
      });
    
    });
  </script>
</body>
</html>
