<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Variants Customizer | MAGIZHVAGAM</title>
  
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
</head>
<body style="visibility:hidden">

  <div class="admin-layout">
    
    <!-- Sidebar navigation placeholder -->
    <aside id="admin-sidebar-container"></aside>

    <!-- Main Content Panel -->
    <main class="admin-main">
      <div id="admin-topbar-container"></div>
      
      <!-- Top header -->
      <section style="margin-bottom:25px;">
        <span style="font-family:'Outfit'; font-size:12px; font-weight:700; color:var(--adm-accent); text-transform:uppercase; letter-spacing:0.1em; display:block; margin-bottom:6px;">Catalog Manager</span>
        <h1 style="font-family:'Outfit'; font-size:32px; font-weight:800; color:var(--text-color); margin:0;">Product Variants Customizer</h1>
        <p style="color:var(--text-muted); font-size:13px; margin:4px 0 0 0;">Define custom variants (e.g. box packaging, wooden tags, silk wraps) to append on products catalog.</p>
      </section>

      
      <div class="grid grid-2" style="display:grid; grid-template-columns: 1fr 1.2fr; gap:30px;">
        <div class="glass" style="padding:25px; border-radius:12px; height:fit-content;">
          <h2 style="font-family:'Outfit'; font-size:18px; margin-top:0; margin-bottom:15px; color:var(--text-color);">Add Variant Group</h2>
          <form id="add-variant-group-form" style="display:flex; flex-direction:column; gap:14px;">
            <div class="admin-form-group">
              <label>Variant Name *</label>
              <input type="text" id="var-group-name" class="admin-form-control" placeholder="e.g. Size, Color, Packaging" required>
            </div>
            <div class="admin-form-group">
              <label>Options (Comma separated) *</label>
              <input type="text" id="var-group-options" class="admin-form-control" placeholder="e.g. Small, Medium, Large" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; border-radius:8px;">Add Variant Group</button>
          </form>
        </div>

        <div class="glass" style="padding:25px; border-radius:12px;">
          <h2 style="font-family:'Outfit'; font-size:18px; margin-top:0; margin-bottom:15px; color:var(--text-color);">Active Variant Configurations</h2>
          <div id="variants-list-container" style="display:flex; flex-direction:column; gap:10px; max-height:450px; overflow-y:auto;"></div>
        </div>
      </div>
    

    </main>

  </div>

  <!-- Scripts -->
  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/vendor/gsap.min.js"></script>
  <script src="/assets/vendor/ScrollTrigger.min.js"></script>
  <script src="/assets/vendor/lenis.min.js"></script>
  <script src="/assets/js/admin.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      window.updateAdminBreadcrumbs('Catalog', 'Variants');
      loadVariantsConfig();

      function loadVariantsConfig() {
        const container = document.getElementById('variants-list-container');
        if (!container) return;
        
        let customVariants = JSON.parse(localStorage.getItem('product_variants_custom') || '[]');
        if (customVariants.length === 0) {
          customVariants = [
            { id: 1, name: 'Packaging Box', options: 'Standard Box, Premium Gold Box, Eco Jute Bag' },
            { id: 2, name: 'Gift Card Customization', options: 'Standard Tag, Engraved Wood Plate, Silver Foil Card' }
          ];
          localStorage.setItem('product_variants_custom', JSON.stringify(customVariants));
        }

        container.innerHTML = customVariants.map(v => `
          <div class="glass" style="padding:16px; border-radius:10px; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <div>
              <strong style="color:var(--adm-accent);">${v.name}</strong>
              <div style="font-size:11px; color:var(--text-muted); margin-top:2px;">Options: ${v.options}</div>
            </div>
            <button onclick="deleteVariant('${v.id}')" class="btn" style="background:#ef4444 !important; color:white; border:none; padding:6px 12px; font-size:10px; border-radius:6px;">Delete</button>
          </div>
        `).join('');
      }
      window.loadVariantsConfig = loadVariantsConfig;

      window.deleteVariant = (id) => {
        let customVariants = JSON.parse(localStorage.getItem('product_variants_custom') || '[]');
        customVariants = customVariants.filter(v => v.id != id);
        localStorage.setItem('product_variants_custom', JSON.stringify(customVariants));
        showToast('Variant configuration deleted!', 'success');
        loadVariantsConfig();
      };

      document.getElementById('add-variant-group-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('var-group-name').value.trim();
        const options = document.getElementById('var-group-options').value.trim();

        let customVariants = JSON.parse(localStorage.getItem('product_variants_custom') || '[]');
        customVariants.push({ id: Date.now(), name, options });
        localStorage.setItem('product_variants_custom', JSON.stringify(customVariants));

        showToast('Variant group added successfully!', 'success');
        document.getElementById('add-variant-group-form').reset();
        loadVariantsConfig();
      });
    
    });
  </script>
</body>
</html>
