<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coupons & Discounts | MAGIZHVAGAM</title>
  
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
</head>
<body style="visibility:hidden">

  <div class="admin-layout">
    
    <!-- Sidebar navigation -->
    <aside id="admin-sidebar-container"></aside>

    <!-- Main Coupons Panel -->
    <main class="admin-main">
      <div id="admin-topbar-container"></div>
      
      <!-- Top header -->
      <section style="margin-bottom:25px;">
        <span style="font-family:'Outfit'; font-size:12px; font-weight:700; color:var(--adm-accent); text-transform:uppercase; letter-spacing:0.1em; display:block; margin-bottom:6px;">Marketing Operations</span>
        <h1 style="font-family:'Outfit'; font-size:32px; font-weight:800; color:var(--text-color); margin:0;">Discount Coupons</h1>
        <p style="color:var(--text-muted); font-size:13px; margin:4px 0 0 0;">Create percentage or flat promo offers and manage active campaign validation terms.</p>
      </section>

      <div class="grid grid-2" style="display:grid; grid-template-columns: 1fr 1.3fr; gap:30px;">
        <!-- Coupon Creator Form -->
        <div class="glass" style="padding:25px; border-radius:12px;">
          <h3 style="font-family:'Outfit'; font-size:20px; color:var(--text-color); margin-top:0; margin-bottom:15px;">Create New Coupon</h3>
          <form id="coupon-creator-form">
            <div class="admin-form-group">
              <label>Coupon Code *</label>
              <input type="text" id="cp-code" class="admin-form-control" placeholder="WELCOME10" style="text-transform:uppercase;" required>
            </div>
            <div class="admin-form-group">
              <label>Discount Type *</label>
              <select id="cp-type" class="admin-form-control">
                <option value="Percentage">Percentage (%)</option>
                <option value="FixedAmount">Fixed Amount (₹)</option>
              </select>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
              <div class="admin-form-group">
                <label>Discount Value *</label>
                <input type="number" id="cp-value" class="admin-form-control" min="1" placeholder="e.g. 10" required>
              </div>
              <div class="admin-form-group">
                <label>Min Order Value (₹)</label>
                <input type="number" id="cp-min-value" class="admin-form-control" value="0" min="0" required>
              </div>
            </div>
            <div class="admin-form-group">
              <label>Expiry Date *</label>
              <input type="date" id="cp-expiry" class="admin-form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; border-radius:8px; margin-top:10px;">Create Coupon</button>
          </form>
        </div>

        <!-- Coupons Directory List -->
        <div class="glass" style="padding:25px; border-radius:12px;">
          <h3 style="font-family:'Outfit'; font-size:20px; color:var(--text-color); margin-top:0; margin-bottom:15px;">Active Coupons</h3>
          <div id="coupons-list-container" style="display:flex; flex-direction:column; gap:12px; max-height:500px; overflow-y:auto;">
            <div style="text-align:center;"><div class="spinner" style="margin:auto;"></div></div>
          </div>
        </div>
      </div>
    </main>

  </div>

  <!-- Scripts -->
  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/vendor/gsap.min.js"></script>
  <script src="/assets/vendor/ScrollTrigger.min.js"></script>
  <script src="/assets/vendor/lenis.min.js"></script>
  <script src="/assets/js/admin.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadCouponsList();
      window.updateAdminBreadcrumbs('Marketing', 'Coupons');
    });

    async function loadCouponsList() {
      const container = document.getElementById('coupons-list-container');
      if (!container) return;
      container.innerHTML = '<div style="text-align:center;"><div class="spinner" style="margin:auto;"></div></div>';

      try {
        const res = await adminFetch('/api/settings/coupons/all');
        const data = await res.json();
        
        if (data.success && data.coupons) {
          if (data.coupons.length === 0) {
            container.innerHTML = '<p style="color:var(--text-muted); font-size:13px; text-align:center;">No coupons registered yet.</p>';
            return;
          }

          container.innerHTML = data.coupons.map(c => {
            const exp = new Date(c.expiresAt).toLocaleDateString('en-IN');
            const typeStr = c.discountType === 'Percentage' ? `${c.discountValue}%` : `₹${c.discountValue}`;
            return `
              <div class="glass-panel" style="padding:15px; border-radius:10px; border:1px solid var(--card-border); display:flex; justify-content:space-between; align-items:center;">
                <div>
                  <strong style="color:var(--adm-accent); font-size:15px; letter-spacing:0.05em;">${c.code}</strong>
                  <div style="font-size:12px; color:var(--text-color); margin-top:4px;">Discount: <strong>${typeStr}</strong> (Min: ₹${c.minOrderValue})</div>
                  <div style="font-size:10px; color:var(--text-muted); margin-top:2px;">Expires: ${exp}</div>
                </div>
                <button onclick="deleteCoupon('${c.code}')" class="btn" style="background:#ef4444; border:none; color:white; padding:6px 12px; font-size:11px; border-radius:6px;">Delete</button>
              </div>
            `;
          }).join('');
        } else {
          container.innerHTML = '<p style="color:var(--text-muted); font-size:13px;">No coupons found.</p>';
        }
      } catch (err) {
        container.innerHTML = '<p style="color:var(--adm-danger); font-size:13px;">Failed to load coupons list.</p>';
      }
    }

    document.getElementById('coupon-creator-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const code = document.getElementById('cp-code').value.trim().toUpperCase();
      const discountType = document.getElementById('cp-type').value;
      const discountValue = parseInt(document.getElementById('cp-value').value) || 0;
      const minOrderValue = parseInt(document.getElementById('cp-min-value').value) || 0;
      const expiresAt = document.getElementById('cp-expiry').value;

      const payload = { code, discountType, discountValue, minOrderValue, expiresAt };

      adminFetch('/api/settings/coupons', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          showToast('Coupon created successfully!', 'success');
          document.getElementById('coupon-creator-form').reset();
          loadCouponsList();
        } else {
          showToast(data.error || 'Failed to create coupon', 'error');
        }
      })
      .catch(() => showToast('Error creating coupon', 'error'));
    });

    async function deleteCoupon(code) {
      if (!confirm(`Are you sure you want to delete coupon code "${code}"?`)) return;
      try {
        const res = await adminFetch(`/api/settings/coupons/${code}`, { method: 'DELETE' });
        const data = await res.json();
        if (data.success) {
          showToast('Coupon deleted successfully', 'success');
          loadCouponsList();
        } else {
          showToast(data.error || 'Failed to delete coupon', 'error');
        }
      } catch (err) {
        showToast('Error deleting coupon', 'error');
      }
    }
    window.deleteCoupon = deleteCoupon;
  </script>
</body>
</html>
