<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigation Menu Builder | MAGIZHVAGAM</title>
  
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
</head>
<body style="visibility:hidden">

  <div class="admin-layout">
    
    <!-- Sidebar navigation -->
    <aside id="admin-sidebar-container"></aside>

    <!-- Main Navigation Builder Panel -->
    <main class="admin-main">
      <div id="admin-topbar-container"></div>
      
      <!-- Top header -->
      <section style="margin-bottom:25px;">
        <span style="font-family:'Outfit'; font-size:12px; font-weight:700; color:var(--adm-accent); text-transform:uppercase; letter-spacing:0.1em; display:block; margin-bottom:6px;">Content Operations</span>
        <h1 style="font-family:'Outfit'; font-size:32px; font-weight:800; color:var(--text-color); margin:0;">Store Navigation Menus</h1>
        <p style="color:var(--text-muted); font-size:13px; margin:4px 0 0 0;">Add and modify navigation items displayed on the customer header and footer menus.</p>
      </section>

      <div class="grid grid-2" style="display:grid; grid-template-columns: 1fr 1.3fr; gap:30px;">
        <!-- Add Link Form -->
        <div class="glass" style="padding:25px; border-radius:12px; height:fit-content;">
          <h3 style="font-family:'Outfit'; font-size:20px; color:var(--text-color); margin-top:0; margin-bottom:15px;">Add Navigation Link</h3>
          <form id="nav-link-form" onsubmit="event.preventDefault();">
            <div class="admin-form-group">
              <label>Menu Type *</label>
              <select id="nav-type" class="admin-form-control">
                <option value="header">Header Navigation Menu</option>
                <option value="footer">Footer Quick Links Menu</option>
              </select>
            </div>
            <div class="admin-form-group">
              <label>Link Display Text (English) *</label>
              <input type="text" id="nav-text-en" class="admin-form-control" placeholder="e.g. Copper Hampers" required>
            </div>
            <div class="admin-form-group">
              <label>Link Display Text (Tamil) *</label>
              <input type="text" id="nav-text-ta" class="admin-form-control" placeholder="e.g. செம்பு பரிசுப் பெட்டிகள்" required>
            </div>
            <div class="admin-form-group">
              <label>Destination Path / URL *</label>
              <input type="text" id="nav-url" class="admin-form-control" placeholder="e.g. /products?category=copper" required>
            </div>
            <button id="add-nav-link-btn" type="button" class="btn btn-primary" style="width:100%; border-radius:8px;">Add Navigation Item</button>
          </form>
        </div>

        <!-- Current Navigation Links List -->
        <div class="glass" style="padding:25px; border-radius:12px;">
          <h3 style="font-family:'Outfit'; font-size:20px; color:var(--text-color); margin-top:0; margin-bottom:15px;">Active Menu Directory</h3>
          
          <h4 style="font-family:'Outfit'; font-size:14px; margin-bottom:10px; color:var(--adm-accent);">Header Links</h4>
          <div id="header-links-container" style="display:flex; flex-direction:column; gap:8px; margin-bottom:20px;">
            <!-- Rendered by JS -->
          </div>

          <h4 style="font-family:'Outfit'; font-size:14px; margin-bottom:10px; color:var(--adm-accent);">Footer Links</h4>
          <div id="footer-links-container" style="display:flex; flex-direction:column; gap:8px;">
            <!-- Rendered by JS -->
          </div>
        </div>
      </div>
    </main>

  </div>

  <!-- Scripts -->
  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/vendor/gsap.min.js"></script>
  <script src="/assets/vendor/ScrollTrigger.min.js"></script>
  <script src="/assets/vendor/lenis.min.js"></script>
  <script src="/assets/js/admin.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadNavigationMenus();
      window.updateAdminBreadcrumbs('Content', 'Navigation Menu');
    });

    let headerLinks = [
      { textEn: 'Home', textTa: 'முகப்பு', url: '/' },
      { textEn: 'Catalog', textTa: 'பொருட்கள்', url: '/products' },
      { textEn: 'About', textTa: 'எங்களைப் பற்றி', url: '/about' }
    ];

    let footerLinks = [
      { textEn: 'FAQ Support', textTa: 'கேள்விகள்', url: '/faq' },
      { textEn: 'Return Policies', textTa: 'கொள்கைகள்', url: '/policies' },
      { textEn: 'Legal Terms', textTa: 'விதிமுறைகள்', url: '/terms' }
    ];

    function loadNavigationMenus() {
      renderNavList('header', headerLinks, 'header-links-container');
      renderNavList('footer', footerLinks, 'footer-links-container');
    }

    function renderNavList(type, list, containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;

      container.innerHTML = list.map((item, index) => `
        <div class="glass-panel" style="padding:10px 15px; border-radius:8px; border:1px solid var(--card-border); display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.01);">
          <div>
            <strong>${item.textEn} (${item.textTa})</strong>
            <div style="font-size:11px; color:var(--text-muted); margin-top:2px;">URL: ${item.url}</div>
          </div>
          <button onclick="deleteNavLink('${type}', ${index})" class="btn" style="background:#ef4444; border:none; color:white; padding:4px 8px; font-size:10px; border-radius:4px;">✕</button>
        </div>
      `).join('');
    }

    function deleteNavLink(type, index) {
      if (type === 'header') {
        headerLinks.splice(index, 1);
      } else {
        footerLinks.splice(index, 1);
      }
      showToast('Navigation link removed!', 'success');
      loadNavigationMenus();
    }
    window.deleteNavLink = deleteNavLink;

    document.getElementById('add-nav-link-btn').addEventListener('click', () => {
      const type = document.getElementById('nav-type').value;
      const textEn = document.getElementById('nav-text-en').value.trim();
      const textTa = document.getElementById('nav-text-ta').value.trim();
      const url = document.getElementById('nav-url').value.trim();

      if (!textEn || !textTa || !url) {
        showToast('Please fill out all link inputs', 'warning');
        return;
      }

      const newLink = { textEn, textTa, url };
      if (type === 'header') {
        headerLinks.push(newLink);
      } else {
        footerLinks.push(newLink);
      }

      showToast('Navigation link added successfully!', 'success');
      document.getElementById('nav-text-en').value = '';
      document.getElementById('nav-text-ta').value = '';
      document.getElementById('nav-url').value = '';
      loadNavigationMenus();
    });
  </script>
</body>
</html>
