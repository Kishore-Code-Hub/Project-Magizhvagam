<div class="workspace-panel" data-workspace="colors">
  <h3 style="font-family:'Outfit'; font-size:16px; margin-bottom:12px; color:var(--studio-gold);">Colors Customize</h3>
  <p style="font-size:11px; color:var(--studio-text-muted); margin-bottom:16px;">Coordinate your brand identity palette. Colors are checked for readability contrast.</p>

  <div id="contrast-lock-indicator" style="padding:12px 16px; border-radius:8px; font-size:12px; font-weight:700; display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; background:rgba(255,255,255,0.02); border:1px solid var(--studio-border);">
    <span>Contrast Ratio (Link vs Main BG):</span>
    <strong id="contrast-score-val">--</strong>
  </div>

  <!-- Branding Colors Accordion -->
  <div class="studio-accordion open" style="margin-bottom:15px; border:1px solid var(--studio-border); border-radius:8px; padding:12px; background:rgba(0,0,0,0.1);">
    <div class="studio-accordion-header" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;" onclick="this.parentElement.classList.toggle('open')">
      <h4 style="margin:0; font-size:13px; color:var(--studio-gold);">Global Brand Accent Colors</h4>
      <span class="studio-accordion-icon" style="font-size:10px;">▼</span>
    </div>
    <div class="studio-accordion-content" style="margin-top:10px; display:flex; flex-direction:column; gap:12px;">
      <div class="control-group">
        <label style="font-size:11px; display:block; margin-bottom:4px;">Primary Brand (Logo & Active Links)</label>
        <div class="color-picker-wrapper" style="display:flex; gap:8px;">
          <input type="color" id="primary-color-field" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
          <input type="text" id="primary-color-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
        </div>
      </div>
      <div class="control-group">
        <label style="font-size:11px; display:block; margin-bottom:4px;">Secondary Brand (Link Hover)</label>
        <div class="color-picker-wrapper" style="display:flex; gap:8px;">
          <input type="color" id="secondary-color-field" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
          <input type="text" id="secondary-color-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
        </div>
      </div>
      <div class="control-group">
        <label style="font-size:11px; display:block; margin-bottom:4px;">Accent Highlight (Sales Badges)</label>
        <div class="color-picker-wrapper" style="display:flex; gap:8px;">
          <input type="color" id="accent-color-field" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
          <input type="text" id="accent-color-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
        </div>
      </div>
    </div>
  </div>

  <!-- Backgrounds & Typography Canvas Accordion -->
  <div class="studio-accordion open" style="margin-bottom:15px; border:1px solid var(--studio-border); border-radius:8px; padding:12px; background:rgba(0,0,0,0.1);">
    <div class="studio-accordion-header" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;" onclick="this.parentElement.classList.toggle('open')">
      <h4 style="margin:0; font-size:13px; color:var(--studio-gold);">Canvas Background & Text Colors</h4>
      <span class="studio-accordion-icon" style="font-size:10px;">▼</span>
    </div>
    <div class="studio-accordion-content" style="margin-top:10px; display:flex; flex-direction:column; gap:12px;">
      <div class="control-group">
        <label style="font-size:11px; display:block; margin-bottom:4px;">Main Background Color</label>
        <div class="color-picker-wrapper" style="display:flex; gap:8px;">
          <input type="color" id="palette-bg-main" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
          <input type="text" id="palette-bg-main-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
        </div>
      </div>
      <div class="control-group">
        <label style="font-size:11px; display:block; margin-bottom:4px;">Surface Background (Cards & Dropdowns)</label>
        <div class="color-picker-wrapper" style="display:flex; gap:8px;">
          <input type="color" id="palette-bg-surface" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
          <input type="text" id="palette-bg-surface-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
        </div>
      </div>
      <div class="control-group">
        <label style="font-size:11px; display:block; margin-bottom:4px;">Main Text Color</label>
        <div class="color-picker-wrapper" style="display:flex; gap:8px;">
          <input type="color" id="palette-text-main" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
          <input type="text" id="palette-text-main-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
        </div>
      </div>
      <div class="control-group">
        <label style="font-size:11px; display:block; margin-bottom:4px;">Muted / Secondary Text Color</label>
        <div class="color-picker-wrapper" style="display:flex; gap:8px;">
          <input type="color" id="palette-text-muted" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
          <input type="text" id="palette-text-muted-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
        </div>
      </div>
    </div>
  </div>

  <!-- Component & Status Accent Colors Accordion -->
  <div class="studio-accordion open" style="margin-bottom:15px; border:1px solid var(--studio-border); border-radius:8px; padding:12px; background:rgba(0,0,0,0.1);">
    <div class="studio-accordion-header" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;" onclick="this.parentElement.classList.toggle('open')">
      <h4 style="margin:0; font-size:13px; color:var(--studio-gold);">Buttons & Status Colors</h4>
      <span class="studio-accordion-icon" style="font-size:10px;">▼</span>
    </div>
    <div class="studio-accordion-content" style="margin-top:10px; display:flex; flex-direction:column; gap:12px;">
      <div class="control-group">
        <label style="font-size:11px; display:block; margin-bottom:4px;">Primary Button Background</label>
        <div class="color-picker-wrapper" style="display:flex; gap:8px;">
          <input type="color" id="palette-color-primary" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
          <input type="text" id="palette-color-primary-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
        </div>
      </div>
      <div class="control-group">
        <label style="font-size:11px; display:block; margin-bottom:4px;">Primary Button Hover Background</label>
        <div class="color-picker-wrapper" style="display:flex; gap:8px;">
          <input type="color" id="palette-color-secondary" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
          <input type="text" id="palette-color-secondary-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
        </div>
      </div>
      <div class="control-group">
        <label style="font-size:11px; display:block; margin-bottom:4px;">In-Stock Success Color</label>
        <div class="color-picker-wrapper" style="display:flex; gap:8px;">
          <input type="color" id="palette-color-success" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
          <input type="text" id="palette-color-success-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
        </div>
      </div>
      <div class="control-group">
        <label style="font-size:11px; display:block; margin-bottom:4px;">Out-of-Stock Error Color</label>
        <div class="color-picker-wrapper" style="display:flex; gap:8px;">
          <input type="color" id="palette-color-error" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
          <input type="text" id="palette-color-error-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
        </div>
      </div>
    </div>
  </div>
</div>
