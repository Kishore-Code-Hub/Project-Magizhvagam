<div class="workspace-panel" data-workspace="footer">
  <h3 style="font-family:'Outfit'; font-size:16px; margin-bottom:12px; color:var(--studio-gold);">Footer Setting</h3>
  <p style="font-size:11px; color:var(--studio-text-muted); margin-bottom:16px;">Configure footer section styling parameters and copyright contact detail blocks.</p>

  <div class="glass" style="padding:20px; border-radius:8px; display:flex; flex-direction:column; gap:16px;">
    <!-- Footer BG -->
    <div class="control-group">
      <label style="font-size:11px; display:block; margin-bottom:4px; font-weight:700;">Footer Background Color</label>
      <div style="display:flex; gap:8px;">
        <input type="color" id="ft-bg-picker" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
        <input type="text" id="ft-bg-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
      </div>
    </div>

    <!-- Footer Heading Color -->
    <div class="control-group">
      <label style="font-size:11px; display:block; margin-bottom:4px; font-weight:700;">Footer Widgets Title Color</label>
      <div style="display:flex; gap:8px;">
        <input type="color" id="ft-heading-picker" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
        <input type="text" id="ft-heading-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
      </div>
    </div>

    <!-- Footer Link Color -->
    <div class="control-group">
      <label style="font-size:11px; display:block; margin-bottom:4px; font-weight:700;">Footer Links Text Color</label>
      <div style="display:flex; gap:8px;">
        <input type="color" id="ft-link-picker" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
        <input type="text" id="ft-link-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
      </div>
    </div>

    <!-- Footer Text Details -->
    <div class="control-group" style="margin-top:5px;">
      <label style="font-size:11px; display:block; margin-bottom:4px; font-weight:700;">Footer Copyright / Store Description Text</label>
      <textarea id="footer-content-field" class="studio-input" rows="4" style="width:100%; padding:8px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color); resize:vertical;"></textarea>
      <p style="font-size:10px; color:var(--studio-text-muted); margin-top:4px;">Displayed under the brand logo inside the storefront footer widget block.</p>
    </div>
  </div>
</div>
