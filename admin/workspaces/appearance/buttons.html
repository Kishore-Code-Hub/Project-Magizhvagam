<div class="workspace-panel" data-workspace="buttons">
  <h3 style="font-family:'Outfit'; font-size:16px; margin-bottom:12px; color:var(--studio-gold);">Buttons Style</h3>
  <p style="font-size:11px; color:var(--studio-text-muted); margin-bottom:16px;">Customize storefront primary button shapes, shadow weights, and font weights.</p>

  <div class="glass" style="padding:20px; border-radius:8px; display:flex; flex-direction:column; gap:16px;">
    <!-- Button Border style -->
    <div class="control-group">
      <label style="font-size:11px; display:block; margin-bottom:4px; font-weight:700;">Button Shape Outline</label>
      <select id="button-style-field" class="studio-input" style="width:100%; padding:8px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
        <option value="sharp">Sharp Edges (0px radius)</option>
        <option value="rounded">Rounded Corners (10px radius)</option>
        <option value="pill">Pill Shape (30px radius)</option>
      </select>
    </div>

    <!-- Button Shadow strength -->
    <div class="control-group">
      <label style="font-size:11px; display:block; margin-bottom:4px; font-weight:700;">Button Shadow Depth</label>
      <select id="button-shadow-field" class="studio-input" style="width:100%; padding:8px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
        <option value="soft">Soft Outline Shadow</option>
        <option value="pronounced">Pronounced Drop Shadow</option>
      </select>
    </div>

    <!-- Button Font weight -->
    <div class="control-group">
      <label style="font-size:11px; display:block; margin-bottom:4px; font-weight:700;">Button Text Font Weight</label>
      <select id="button-weight-field" class="studio-input" style="width:100%; padding:8px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
        <option value="400">Regular (400)</option>
        <option value="500">Medium (500)</option>
        <option value="600">Semi-Bold (600)</option>
        <option value="700">Bold (700)</option>
      </select>
    </div>
  </div>
</div>
