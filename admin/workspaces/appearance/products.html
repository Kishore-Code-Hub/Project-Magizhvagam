<div class="workspace-panel" data-workspace="products">
  <h3 style="font-family:'Outfit'; font-size:16px; margin-bottom:12px; color:var(--studio-gold);">Product Pages</h3>
  <p style="font-size:11px; color:var(--studio-text-muted); margin-bottom:16px;">Configure single product details page (PDP) visual accents, gallery borders, specification titles, and tab highlight states.</p>

  <div class="glass" style="padding:20px; border-radius:8px; display:flex; flex-direction:column; gap:16px;">
    <!-- Gallery Active Border -->
    <div class="control-group">
      <label style="font-size:11px; display:block; margin-bottom:4px; font-weight:700;">Image Gallery Active Thumbnail Outline</label>
      <div style="display:flex; gap:8px;">
        <input type="color" id="pdp-gallery-border-field" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
        <input type="text" id="pdp-gallery-border-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
      </div>
    </div>

    <!-- Specs Heading Color -->
    <div class="control-group">
      <label style="font-size:11px; display:block; margin-bottom:4px; font-weight:700;">Product Technical Specifications Header Text</label>
      <div style="display:flex; gap:8px;">
        <input type="color" id="pdp-spec-heading-field" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
        <input type="text" id="pdp-spec-heading-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
      </div>
    </div>

    <!-- Tabs Active Highlight Color -->
    <div class="control-group">
      <label style="font-size:11px; display:block; margin-bottom:4px; font-weight:700;">Active Info Tabs Focus Highlights</label>
      <div style="display:flex; gap:8px;">
        <input type="color" id="pdp-tab-active-field" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
        <input type="text" id="pdp-tab-active-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
      </div>
    </div>
  </div>
</div>
