<div class="workspace-panel" data-workspace="navigation">
  <h3 style="font-family:'Outfit'; font-size:16px; margin-bottom:12px; color:var(--studio-gold);">Navigation Options</h3>
  <p style="font-size:11px; color:var(--studio-text-muted); margin-bottom:16px;">Configure styling settings for dropdown menu overlays, borders, and active highlights.</p>

  <div class="glass" style="padding:20px; border-radius:8px; display:flex; flex-direction:column; gap:16px;">
    <!-- Dropdown bg -->
    <div class="control-group">
      <label style="font-size:11px; display:block; margin-bottom:4px; font-weight:700;">Dropdown Panel Background Color</label>
      <div style="display:flex; gap:8px;">
        <input type="color" id="nav-dropdown-bg-picker" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
        <input type="text" id="nav-dropdown-bg-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
      </div>
    </div>

    <!-- Dropdown border -->
    <div class="control-group">
      <label style="font-size:11px; display:block; margin-bottom:4px; font-weight:700;">Dropdown Border Outline Color</label>
      <div style="display:flex; gap:8px;">
        <input type="color" id="nav-dropdown-border-picker" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
        <input type="text" id="nav-dropdown-border-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
      </div>
    </div>

    <!-- Dropdown Item Color -->
    <div class="control-group">
      <label style="font-size:11px; display:block; margin-bottom:4px; font-weight:700;">Dropdown Links Default Color</label>
      <div style="display:flex; gap:8px;">
        <input type="color" id="nav-item-picker" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
        <input type="text" id="nav-item-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
      </div>
    </div>

    <!-- Mega Menu active accent -->
    <div class="control-group">
      <label style="font-size:11px; display:block; margin-bottom:4px; font-weight:700;">Mega Menu Accent Highlight Color</label>
      <div style="display:flex; gap:8px;">
        <input type="color" id="nav-mega-picker" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
        <input type="text" id="nav-mega-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
      </div>
    </div>
  </div>
</div>
