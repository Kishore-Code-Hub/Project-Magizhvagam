<div class="workspace-panel" data-workspace="cards">
  <h3 style="font-family:'Outfit'; font-size:16px; margin-bottom:12px; color:var(--studio-gold);">Cards Styling</h3>
  <p style="font-size:11px; color:var(--studio-text-muted); margin-bottom:16px;">Configure storefront visual borders, dropshadow depth, and hover translate effects for product category cards.</p>

  <div class="glass" style="padding:20px; border-radius:8px; display:flex; flex-direction:column; gap:16px;">
    <!-- Card Radius -->
    <div class="control-group">
      <label style="font-size:11px; display:block; margin-bottom:4px; font-weight:700;">Card Corner Radius (pixels)</label>
      <div class="range-slider-wrapper" style="display:flex; align-items:center; gap:12px;">
        <input type="range" id="card-radius-field" min="0" max="32" step="2" class="range-slider" style="flex:1; cursor:pointer;">
        <span id="card-radius-val" class="range-value" style="font-size:12px; font-weight:700; width:36px; text-align:right;">14</span>
      </div>
    </div>

    <!-- Card Shadow strength -->
    <div class="control-group">
      <label style="font-size:11px; display:block; margin-bottom:4px; font-weight:700;">Default Drop Shadow Depth (scale factor)</label>
      <div class="range-slider-wrapper" style="display:flex; align-items:center; gap:12px;">
        <input type="range" id="card-shadow-field" min="0.0" max="3.0" step="0.2" class="range-slider" style="flex:1; cursor:pointer;">
        <span id="card-shadow-val" class="range-value" style="font-size:12px; font-weight:700; width:36px; text-align:right;">1.0</span>
      </div>
    </div>

    <!-- Card Hover Y Offset -->
    <div class="control-group">
      <label style="font-size:11px; display:block; margin-bottom:4px; font-weight:700;">Hover Rise Translate Elevation (pixels)</label>
      <div class="range-slider-wrapper" style="display:flex; align-items:center; gap:12px;">
        <input type="range" id="card-hover-y-field" min="0" max="20" step="2" class="range-slider" style="flex:1; cursor:pointer;">
        <span id="card-hover-y-val" class="range-value" style="font-size:12px; font-weight:700; width:36px; text-align:right;">6</span>
      </div>
    </div>

    <!-- Card Image BG -->
    <div class="control-group">
      <label style="font-size:11px; display:block; margin-bottom:4px; font-weight:700;">Card Inner Image Frame Background Color</label>
      <div style="display:flex; gap:8px;">
        <input type="color" id="card-image-bg-field" style="width:36px; height:32px; border:none; padding:0; background:none; cursor:pointer;">
        <input type="text" id="card-image-bg-text" class="studio-input" style="flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--studio-border); border-radius:6px; background:var(--studio-bg); color:var(--text-color);">
      </div>
    </div>
  </div>
</div>
