<div class="workspace-panel" data-workspace="analytics">
  <div class="glass" style="padding:25px; border-radius:12px; max-width:650px; margin:0 auto;">
    <h3 style="font-family:'Outfit'; font-size:20px; color:var(--text-color); margin-bottom:15px;">📊 Analytics Tracking IDs</h3>
    <form id="analytics-settings-form">
      <div class="admin-form-group">
        <label>Google Analytics Measurement ID (G-XXXXXX)</label>
        <input type="text" id="analytics-ga" class="admin-form-control" placeholder="G-ABC123XYZ">
      </div>
      <div class="admin-form-group">
        <label>Facebook Pixel ID</label>
        <input type="text" id="analytics-pixel" class="admin-form-control" placeholder="1234567890">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; border-radius:8px; margin-top:10px;">Save Analytics Integration</button>
    </form>
  </div>
</div>
