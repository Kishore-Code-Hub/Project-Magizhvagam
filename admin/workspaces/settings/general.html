<div class="workspace-panel" data-workspace="general">
  <div class="glass" style="padding:25px; border-radius:12px; max-width:650px; margin:0 auto;">
    <h3 style="font-family:'Outfit'; font-size:20px; color:var(--text-color); margin-bottom:15px;">⚙️ Store Profile Settings</h3>
    <form id="general-settings-form">
      <div class="admin-form-group">
        <label>Store Name</label>
        <input type="text" id="general-store-name" class="admin-form-control" placeholder="MAGIZHVAGAM" required>
      </div>
      <div class="admin-form-group">
        <label>Store Tagline</label>
        <input type="text" id="general-store-tagline" class="admin-form-control" placeholder="PREMIUM RETURN GIFTS" required>
      </div>
      <div class="admin-form-group">
        <label>Currency Symbol</label>
        <input type="text" id="general-currency" class="admin-form-control" placeholder="₹" required>
      </div>
      <div class="admin-form-group">
        <label>Customer Support Email</label>
        <input type="email" id="general-support-email" class="admin-form-control" placeholder="contact@magizhvagam.com" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; border-radius:8px; margin-top:10px;">Save General Settings</button>
    </form>
  </div>
</div>
