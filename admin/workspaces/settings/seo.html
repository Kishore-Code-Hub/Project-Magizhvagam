<div class="workspace-panel" data-workspace="seo">
  <div class="glass" style="padding:25px; border-radius:12px; max-width:650px; margin:0 auto;">
    <h3 style="font-family:'Outfit'; font-size:20px; color:var(--text-color); margin-bottom:15px;">🔍 Search Engine Index Tags</h3>
    <form id="seo-settings-form">
      <div class="admin-form-group">
        <label>Default Page Meta Title</label>
        <input type="text" id="seo-title" class="admin-form-control" placeholder="Magizhvagam | Premium Return Gifts Chennai" required>
      </div>
      <div class="admin-form-group">
        <label>Default Meta Description</label>
        <textarea id="seo-desc" class="admin-form-control" rows="4" placeholder="Explore handcrafted luxury gift items..." required></textarea>
      </div>
      <div class="admin-form-group">
        <label>Meta Keywords (Comma separated list)</label>
        <input type="text" id="seo-keywords" class="admin-form-control" placeholder="return gifts, wedding presents, luxury gifts" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; border-radius:8px; margin-top:10px;">Save SEO Options</button>
    </form>
  </div>
</div>
