<div class="workspace-panel" data-workspace="mobile-settings">
  <div class="glass" style="padding:25px; border-radius:12px; max-width:650px; margin:0 auto;">
    <h3 style="font-family:'Outfit'; font-size:20px; color:var(--text-color); margin-bottom:15px;">📱 Mobile View Offset</h3>
    <form id="mobile-settings-form">
      <div class="admin-form-group">
        <label>Mobile Font Scaling Offset (multiplier)</label>
        <input type="number" id="mobile-font-scale-field" class="admin-form-control" min="0.5" max="1.5" step="0.05" value="0.9" required>
      </div>
      <div class="admin-form-group">
        <label>Mobile Header Height Offset (px)</label>
        <input type="number" id="mobile-header-height-field" class="admin-form-control" min="30" max="120" value="64" required>
      </div>
      <div class="admin-form-group">
        <label>Mobile Navigation Drawer Background</label>
        <input type="color" id="mobile-nav-bg-field" value="#0b0618" style="cursor:pointer; width:60px; height:36px; padding:2px; border-radius:6px; border:1px solid var(--card-border);" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; border-radius:8px; margin-top:10px;">Save Mobile Configuration</button>
    </form>
  </div>
</div>
