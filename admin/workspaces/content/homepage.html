<div class="workspace-panel" data-workspace="homepage">
  <div class="grid grid-2" style="gap:30px; align-items:start;">
    <!-- Sections Manager -->
    <div class="glass" style="padding:25px; border-radius:12px;">
      <h3 style="font-family:'Outfit'; font-size:20px; color:var(--text-color); margin-bottom:15px;">Sections Sorting</h3>
      <p style="font-size:12px; color:var(--text-muted); margin-bottom:16px;">Reorder and toggle homepage dynamic modules.</p>
      <div id="homepage-sections-manager" class="section-manager-list"></div>
      <button id="save-sections-order-btn" class="btn btn-primary" style="width:100%; margin-top:20px; border-radius:8px;">Save Layout Order</button>
    </div>

    <!-- Banners Visual Builder -->
    <div class="glass" style="padding:25px; border-radius:12px;">
      <h3 style="font-family:'Outfit'; font-size:20px; color:var(--text-color); margin-bottom:15px;">Hero Carousel Banners</h3>
      <div id="hero-banners-visual" style="display:flex; flex-direction:column; gap:12px;"></div>
      <button id="save-hero-banners-btn" class="btn btn-primary" style="width:100%; margin-top:20px; border-radius:8px;">Save Carousel Slides</button>
    </div>
  </div>
</div>
