<div class="workspace-panel" data-workspace="contact">
  <div class="glass" style="padding:25px; border-radius:12px; max-width:650px; margin:0 auto;">
    <h3 style="font-family:'Outfit'; font-size:20px; color:var(--text-color); margin-bottom:15px;">Contact Page Details</h3>
    <form id="contact-page-form">
      <div class="admin-form-group">
        <label>Support Phone</label>
        <input type="text" id="contact-phone" class="admin-form-control" placeholder="+91 98765 43210">
      </div>
      <div class="admin-form-group">
        <label>Support Email</label>
        <input type="email" id="contact-email" class="admin-form-control" placeholder="support@magizhvagam.com">
      </div>
      <div class="admin-form-group">
        <label>Office Address</label>
        <textarea id="contact-address" class="admin-form-control" rows="3" placeholder="No. 12, Premium Gifts Street, Chennai"></textarea>
      </div>
      <div class="admin-form-group">
        <label>Operating Hours</label>
        <input type="text" id="contact-hours" class="admin-form-control" placeholder="Mon - Sat: 9:00 AM - 7:00 PM">
      </div>
      <div class="admin-form-group">
        <label>Google Map Embed Source (Iframe src link)</label>
        <input type="text" id="contact-map" class="admin-form-control" placeholder="https://www.google.com/maps/embed/...">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; border-radius:8px; margin-top:10px;">Save Contact Details</button>
    </form>
  </div>
</div>
