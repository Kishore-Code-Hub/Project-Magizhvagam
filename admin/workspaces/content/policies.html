<div class="workspace-panel" data-workspace="policies">
  <div class="grid grid-2" style="gap:30px; align-items:start;">
    <!-- Privacy Policy -->
    <div class="glass" style="padding:25px; border-radius:12px;">
      <h3 style="font-family:'Outfit'; font-size:20px; color:var(--text-color); margin-bottom:15px;">🔒 Privacy Policy</h3>
      <form id="privacy-policy-form">
        <div class="admin-form-group">
          <label>Last Updated</label>
          <input type="text" id="privacy-date" class="admin-form-control" placeholder="June 2026">
        </div>
        <div class="admin-form-group" style="margin-top:10px;">
          <label>Document Body (Markdown supported)</label>
          <textarea id="privacy-text" class="admin-form-control" rows="12" placeholder="Privacy guidelines details..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; border-radius:8px; margin-top:15px;">Save Privacy Policy</button>
      </form>
    </div>

    <!-- Terms of Service -->
    <div class="glass" style="padding:25px; border-radius:12px;">
      <h3 style="font-family:'Outfit'; font-size:20px; color:var(--text-color); margin-bottom:15px;">⚖️ Terms of Service</h3>
      <form id="terms-service-form">
        <div class="admin-form-group">
          <label>Last Updated</label>
          <input type="text" id="terms-date" class="admin-form-control" placeholder="June 2026">
        </div>
        <div class="admin-form-group" style="margin-top:10px;">
          <label>Document Body (Markdown supported)</label>
          <textarea id="terms-text" class="admin-form-control" rows="12" placeholder="Terms of service details..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; border-radius:8px; margin-top:15px;">Save Terms of Service</button>
      </form>
    </div>
  </div>
</div>
