<div class="workspace-panel" data-workspace="popup">
  <div class="glass" style="padding:25px; border-radius:12px; max-width:650px; margin:0 auto;">
    <h3 style="font-family:'Outfit'; font-size:20px; color:var(--text-color); margin-bottom:15px;">🖼️ Promotional Popup Customizer</h3>
    
    <form id="popup-builder-form">
      <div class="feature-toggle-row" style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px dashed var(--card-border); padding-bottom:15px; margin-bottom:20px;">
        <div>
          <strong style="font-size:14px; color:var(--text-color);">Enable Promotional Popup</strong>
          <p style="font-size:12px; color:var(--text-muted); margin:4px 0 0 0;">Display lightbox subscription popups to first time users.</p>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="popup-active">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="admin-form-group">
        <label>Popup Headline</label>
        <input type="text" id="popup-title" class="admin-form-control" placeholder="Get 10% Off Your First Order!">
      </div>
      <div class="admin-form-group">
        <label>Popup Description</label>
        <textarea id="popup-desc" class="admin-form-control" rows="3" placeholder="Subscribe to our newsletter to receive the discount code instantly."></textarea>
      </div>
      <div class="admin-form-group">
        <label>Display Delay (Seconds)</label>
        <input type="number" id="popup-delay" class="admin-form-control" value="5" min="1">
      </div>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
        <div class="admin-form-group">
          <label>CTA Button Label</label>
          <input type="text" id="popup-cta-text" class="admin-form-control" placeholder="Claim Offer">
        </div>
        <div class="admin-form-group">
          <label>CTA Redirect Link</label>
          <input type="text" id="popup-cta-link" class="admin-form-control" placeholder="/products.html">
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; border-radius:8px; margin-top:10px;">Save Popup Settings</button>
    </form>
  </div>
</div>
