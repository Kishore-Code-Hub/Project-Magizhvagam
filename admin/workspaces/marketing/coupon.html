<div class="workspace-panel" data-workspace="coupon">
  <div class="grid grid-2" style="gap:30px; align-items:start;">
    <!-- Coupon Creator Form -->
    <div class="glass" style="padding:25px; border-radius:12px;">
      <h3 style="font-family:'Outfit'; font-size:20px; color:var(--text-color); margin-bottom:15px;">Create New Coupon</h3>
      <form id="coupon-creator-form">
        <div class="admin-form-group">
          <label>Coupon Code *</label>
          <input type="text" id="cp-code" class="admin-form-control" placeholder="WELCOME10" style="text-transform:uppercase;" required>
        </div>
        <div class="admin-form-group">
          <label>Discount Type *</label>
          <select id="cp-type" class="admin-form-control">
            <option value="Percentage">Percentage (%)</option>
            <option value="FixedAmount">Fixed Amount (₹)</option>
          </select>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
          <div class="admin-form-group">
            <label>Discount Value *</label>
            <input type="number" id="cp-value" class="admin-form-control" min="1" placeholder="e.g. 10" required>
          </div>
          <div class="admin-form-group">
            <label>Min Order Value (₹)</label>
            <input type="number" id="cp-min-value" class="admin-form-control" value="0" min="0" required>
          </div>
        </div>
        <div class="admin-form-group">
          <label>Expiry Date *</label>
          <input type="date" id="cp-expiry" class="admin-form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; border-radius:8px; margin-top:10px;">Create Coupon</button>
      </form>
    </div>

    <!-- Coupons Directory List -->
    <div class="glass" style="padding:25px; border-radius:12px;">
      <h3 style="font-family:'Outfit'; font-size:20px; color:var(--text-color); margin-bottom:15px;">Active Coupons</h3>
      <div id="coupons-list-container" style="display:flex; flex-direction:column; gap:12px; max-height:400px; overflow-y:auto;">
        <div style="text-align:center;"><div class="spinner" style="margin:auto;"></div></div>
      </div>
    </div>
  </div>
</div>
