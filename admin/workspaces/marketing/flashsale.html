<div class="workspace-panel" data-workspace="flash-sales">
  <div class="glass" style="padding:25px; border-radius:12px; max-width:650px; margin:0 auto;">
    <h3 style="font-family:'Outfit'; font-size:20px; color:var(--text-color); margin-bottom:15px;">⚡ Flash Sale Configuration</h3>
    
    <div class="feature-toggle-row" style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px dashed var(--card-border); padding-bottom:15px; margin-bottom:20px;">
      <div>
        <strong style="font-size:14px; color:var(--text-color);">Publish Flash Sale Countdown Banner</strong>
        <p style="font-size:12px; color:var(--text-muted); margin:4px 0 0 0;">Toggle the countdown promo section on storefront homepage.</p>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="toggle-flashSaleActive">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="admin-form-group">
      <label>Promotional Banner Text</label>
      <input type="text" id="input-flashSaleText" class="admin-form-control" placeholder="Mega Flash Sale! Get 20% off all return gifts!">
    </div>
    <div class="admin-form-group">
      <label>Target Deadline Date & Time</label>
      <input type="datetime-local" id="input-flashSaleTargetDate" class="admin-form-control">
    </div>
    <button type="button" id="save-flash-sale-btn" class="btn btn-primary" style="width:100%; border-radius:8px; margin-top:10px;">Save Flash Sale Settings</button>
  </div>
</div>
