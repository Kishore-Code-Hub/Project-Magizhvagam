<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketing Hub | MAGIZHVAGAM</title>

  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
  <style>
    .studio-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 10px;
    }
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 24px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #333;
      transition: .3s;
      border-radius: 24px;
    }
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .toggle-slider {
      background-color: var(--primary-color, #D4A03A);
    }
    input:checked + .toggle-slider:before {
      transform: translateX(24px);
    }
  </style>
</head>
<body style="visibility:hidden">
  <div class="admin-layout">
    <!-- Sidebar navigation placeholder -->
    <aside id="admin-sidebar-container"></aside>

    <!-- Main Content -->
    <main class="admin-main" style="padding: 24px !important;">
      <h1 style="font-family:'Outfit'; font-size:32px; color:var(--text-color); margin-bottom:10px;">Marketing Management</h1>
      <p style="color:var(--text-muted); font-size:14px; margin-bottom:20px;">Manage promotional campaigns, discount coupons, mailing list subscribers, and popup builders.</p>

      <!-- Sub tabs row — router owns navigation via data-workspace-tab -->
      <div class="studio-tabs">
        <button type="button" class="studio-tab-btn active" data-workspace-tab="coupons">Coupons Manager</button>
        <button type="button" class="studio-tab-btn" data-workspace-tab="flash-sales">Flash Sales</button>
        <button type="button" class="studio-tab-btn" data-workspace-tab="newsletter">Newsletter Subscribers</button>
        <button type="button" class="studio-tab-btn" data-workspace-tab="popup">Popup Builder</button>
      </div>

      <!-- Single workspace container — only ONE workspace renders here at a time -->
      <div id="workspace-container"></div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/js/admin.js"></script>
  <script src="/assets/js/workspace-engine.js"></script>
  <script src="/assets/js/modules/marketing/coupon.controller.js"></script>
  <script src="/assets/js/modules/marketing/flashsale.controller.js"></script>
  <script src="/assets/js/modules/marketing/newsletter.controller.js"></script>
  <script src="/assets/js/modules/marketing/popup.controller.js"></script>
  <script src="/assets/js/modules/marketing/marketing.router.js"></script>
</body>
</html>
