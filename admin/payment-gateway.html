<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Gateway Configuration | MAGIZHVAGAM</title>
  
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
</head>
<body style="visibility:hidden">

  <div class="admin-layout">
    
    <!-- Sidebar navigation placeholder -->
    <aside id="admin-sidebar-container"></aside>

    <!-- Main Content Panel -->
    <main class="admin-main">
      <div id="admin-topbar-container"></div>
      
      <!-- Top header -->
      <section style="margin-bottom:25px;">
        <span style="font-family:'Outfit'; font-size:12px; font-weight:700; color:var(--adm-accent); text-transform:uppercase; letter-spacing:0.1em; display:block; margin-bottom:6px;">System Settings</span>
        <h1 style="font-family:'Outfit'; font-size:32px; font-weight:800; color:var(--text-color); margin:0;">Payment Gateway Configuration</h1>
        <p style="color:var(--text-muted); font-size:13px; margin:4px 0 0 0;">Verify and link Razorpay keys, webhook triggers, and check status values.</p>
      </section>

      
      <div class="glass" style="padding:25px; border-radius:12px; max-width:600px; margin:0 auto;">
        <h2 style="font-family:'Outfit'; font-size:18px; margin-top:0; margin-bottom:15px; color:var(--text-color);">Payment Integrations</h2>
        <form id="pg-form" style="display:flex; flex-direction:column; gap:16px;">
          <div class="admin-form-group">
            <label>Razorpay Merchant Key ID *</label>
            <input type="text" class="admin-form-control" value="rzp_test_K123o482730" required>
          </div>
          <div class="admin-form-group">
            <label>Razorpay Merchant Secret Key *</label>
            <input type="password" class="admin-form-control" value="••••••••••••••••••••••••" required>
          </div>
          <div class="admin-form-group" style="display:flex; align-items:center; gap:8px;">
            <input type="checkbox" id="testmode-toggle" checked style="width:auto; cursor:pointer;">
            <label for="testmode-toggle" style="margin:0; cursor:pointer;">Enable Sandbox Gifting Test Mode</label>
          </div>
          <button type="submit" class="btn btn-primary">Update Gateway Settings</button>
        </form>
      </div>
    

    </main>

  </div>

  <!-- Scripts -->
  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/vendor/gsap.min.js"></script>
  <script src="/assets/vendor/ScrollTrigger.min.js"></script>
  <script src="/assets/vendor/lenis.min.js"></script>
  <script src="/assets/js/admin.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      window.updateAdminBreadcrumbs('Settings', 'Payment Gateway');
      document.getElementById('pg-form').addEventListener('submit', (e) => {
        e.preventDefault();
        showToast('Payment gateway API credentials securely saved!', 'success');
      });
    
    });
  </script>
</body>
</html>
