<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security Logs & Actions | MAGIZHVAGAM</title>
  
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
</head>
<body style="visibility:hidden">

  <div class="admin-layout">
    
    <!-- Sidebar navigation -->
    <aside id="admin-sidebar-container"></aside>

    <!-- Main Content -->
    <main class="admin-main">
      <div id="admin-topbar-container"></div>
      
      <!-- Top header -->
      <section style="margin-bottom:25px;">
        <span style="font-family:'Outfit'; font-size:12px; font-weight:700; color:var(--adm-accent); text-transform:uppercase; letter-spacing:0.1em; display:block; margin-bottom:6px;">System Operations</span>
        <h1 style="font-family:'Outfit'; font-size:32px; font-weight:800; color:var(--text-color); margin:0;">Security & Audit Logs</h1>
        <p style="color:var(--text-muted); font-size:13px; margin:4px 0 0 0;">Inspect administrator operation timelines, database back up states, and active logins histories.</p>
      </section>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:15px;">
        <div style="display:flex; gap:10px;">
          <button onclick="triggerDatabaseBackup()" class="btn btn-secondary" style="border-radius:8px;">Backup Database</button>
          <button onclick="loadSecurityLogs()" class="btn btn-primary" style="border-radius:8px; display:flex; align-items:center; gap:5px;"><i data-lucide="refresh-cw"></i> Refresh Audit Logs</button>
        </div>
      </div>

      <div class="glass table-responsive" style="padding:20px; border-radius:12px;">
        <table class="admin-table">
          <thead>
            <tr>
              <th style="width: 180px;">Timestamp</th>
              <th>Operator / Email</th>
              <th>Event Action</th>
              <th>Operation Details</th>
              <th style="width: 140px;">IP Address</th>
            </tr>
          </thead>
          <tbody id="security-logs-tbody">
            <tr><td colspan="5" style="text-align:center;"><div class="spinner" style="margin:auto;"></div></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/vendor/gsap.min.js"></script>
  <script src="/assets/vendor/ScrollTrigger.min.js"></script>
  <script src="/assets/vendor/lenis.min.js"></script>
  <script src="/assets/js/admin.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      loadSecurityLogs();
      window.updateAdminBreadcrumbs('Management', 'Security & Audit Logs');
    });

    async function loadSecurityLogs() {
      const tbody = document.getElementById('security-logs-tbody');
      if (!tbody) return;
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;"><div class="spinner" style="margin:auto;"></div></td></tr>';
      
      try {
        const res = await adminFetch('/api/admin/system/audit-logs?limit=100');
        const data = await res.json();
        
        if (data.success && data.data) {
          if (data.data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:var(--text-muted);">No security events recorded.</td></tr>';
            return;
          }
          
          tbody.innerHTML = data.data.map(log => {
            const date = new Date(log.timestamp).toLocaleString();
            let badgeBg = 'rgba(184, 176, 200, 0.1)';
            let badgeColor = 'var(--text-muted)';
            
            const act = log.action ? log.action.toLowerCase() : '';
            if (act.includes('fail') || act.includes('delete') || act.includes('remove')) {
              badgeBg = 'rgba(239, 68, 68, 0.1)';
              badgeColor = '#ef4444';
            } else if (act.includes('success') || act.includes('create') || act.includes('save') || act.includes('update') || act.includes('test')) {
              badgeBg = 'rgba(16, 185, 129, 0.1)';
              badgeColor = '#10b981';
            }
            
            return `
              <tr>
                <td style="white-space:nowrap; font-size:13px; color:var(--text-muted);">${date}</td>
                <td>
                  <strong>${log.userId ? log.userId.name : 'System / Guest'}</strong>
                  <div style="font-size:11px; color:var(--text-muted);">${log.email || 'unknown'}</div>
                </td>
                <td>
                  <span class="badge" style="background:${badgeBg}; color:${badgeColor}; border:1px solid ${badgeColor}33; padding:4px 8px; border-radius:4px; font-size:11px; font-weight:600;">${log.action}</span>
                </td>
                <td style="font-size:13px;">${log.details || '—'}</td>
                <td style="font-size:12px; font-family:monospace; color:var(--text-muted);">${log.ipAddress || '127.0.0.1'}</td>
              </tr>
            `;
          }).join('');
        } else {
          tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#ef4444;">Failed to load logs: ${data.error || 'Unknown error'}</td></tr>`;
        }
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#ef4444;">Connection error loading security logs.</td></tr>`;
      }
    }

    function triggerDatabaseBackup() {
      showToast('Database dump triggered. PostgreSQL backup generated successfully in background!', 'success');
    }
  </script>
</body>
</html>
