<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frequently Asked Questions (FAQ) | MAGIZHVAGAM</title>
  
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
</head>
<body style="visibility:hidden">

  <div class="admin-layout">
    
    <!-- Sidebar navigation placeholder -->
    <aside id="admin-sidebar-container"></aside>

    <!-- Main Content Panel -->
    <main class="admin-main">
      <div id="admin-topbar-container"></div>
      
      <!-- Top header -->
      <section style="margin-bottom:25px;">
        <span style="font-family:'Outfit'; font-size:12px; font-weight:700; color:var(--adm-accent); text-transform:uppercase; letter-spacing:0.1em; display:block; margin-bottom:6px;">Content & Layout</span>
        <h1 style="font-family:'Outfit'; font-size:32px; font-weight:800; color:var(--text-color); margin:0;">Frequently Asked Questions (FAQ)</h1>
        <p style="color:var(--text-muted); font-size:13px; margin:4px 0 0 0;">Update frequently asked questions lists, shipping disclosures, and customer refunds rules guides.</p>
      </section>

      
      <div class="grid grid-2" style="display:grid; grid-template-columns:1fr 1.3fr; gap:30px;">
        <div class="glass" style="padding:25px; border-radius:12px; height:fit-content;">
          <h2 style="font-family:'Outfit'; font-size:18px; margin-top:0; margin-bottom:15px; color:var(--text-color);">Create FAQ Item</h2>
          <form id="faq-form" style="display:flex; flex-direction:column; gap:14px;">
            <div class="admin-form-group">
              <label>Question Prompt *</label>
              <input type="text" class="admin-form-control" placeholder="Do you ship outside Tamil Nadu?" required>
            </div>
            <div class="admin-form-group">
              <label>Answer Content *</label>
              <textarea class="admin-form-control" rows="3" placeholder="Yes, we ship all across India..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Save FAQ</button>
          </form>
        </div>

        <div class="glass" style="padding:25px; border-radius:12px;">
          <h2 style="font-family:'Outfit'; font-size:18px; margin-top:0; margin-bottom:15px; color:var(--text-color);">Active Store FAQs</h2>
          <div id="faq-list-container" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>
      </div>
    

    </main>

  </div>

  <!-- Scripts -->
  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/vendor/gsap.min.js"></script>
  <script src="/assets/vendor/ScrollTrigger.min.js"></script>
  <script src="/assets/vendor/lenis.min.js"></script>
  <script src="/assets/js/admin.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      window.updateAdminBreadcrumbs('Content', 'FAQ');
      loadFaqList();

      function loadFaqList() {
        const container = document.getElementById('faq-list-container');
        if (!container) return;

        let faqs = JSON.parse(localStorage.getItem('store_faqs_list') || '[]');
        if (faqs.length === 0) {
          faqs = [
            { id: 1, q: 'Do you offer bulk customization for weddings?', a: 'Yes! We support custom name engravings on Tanjore plates and brass vilakkus for orders above 50 units.' },
            { id: 2, q: 'How long does shipment courier dispatch take?', a: 'All standard orders are dispatched within 24-48 hours. Transit takes 3-5 working days.' }
          ];
          localStorage.setItem('store_faqs_list', JSON.stringify(faqs));
        }

        container.innerHTML = faqs.map(f => `
          <div class="glass" style="padding:15px; border-radius:8px;">
            <strong style="color:var(--adm-accent);">Q: ${f.q}</strong>
            <p style="font-size:12px; color:var(--text-muted); margin:6px 0 0 0;">A: ${f.a}</p>
          </div>
        `).join('');
      }

      document.getElementById('faq-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const q = e.target.querySelector('input').value.trim();
        const a = e.target.querySelector('textarea').value.trim();

        let faqs = JSON.parse(localStorage.getItem('store_faqs_list') || '[]');
        faqs.push({ id: Date.now(), q, a });
        localStorage.setItem('store_faqs_list', JSON.stringify(faqs));

        showToast('FAQ registered successfully!', 'success');
        e.target.reset();
        loadFaqList();
      });
    
    });
  </script>
</body>
</html>
