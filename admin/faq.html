<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frequently Asked Questions (FAQ) | MAGIZHVAGAM</title>
  
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
</head>
<body style="visibility:hidden">

  <div class="admin-layout">
    
    <!-- Sidebar navigation placeholder -->
    <aside id="admin-sidebar-container"></aside>

    <!-- Main Content Panel -->
    <main class="admin-main">
      <div id="admin-topbar-container"></div>
      
      <!-- Top header -->
      <section style="margin-bottom:25px;">
        <span style="font-family:'Outfit'; font-size:12px; font-weight:700; color:var(--adm-accent); text-transform:uppercase; letter-spacing:0.1em; display:block; margin-bottom:6px;">Content & Layout</span>
        <h1 style="font-family:'Outfit'; font-size:32px; font-weight:800; color:var(--text-color); margin:0;">Frequently Asked Questions (FAQ)</h1>
        <p style="color:var(--text-muted); font-size:13px; margin:4px 0 0 0;">Update frequently asked questions lists, shipping disclosures, and customer refunds rules guides.</p>
      </section>

      
      <div class="grid grid-2" style="display:grid; grid-template-columns:1fr 1.3fr; gap:30px;">
        <div class="glass" style="padding:25px; border-radius:12px; height:fit-content;">
          <h2 style="font-family:'Outfit'; font-size:18px; margin-top:0; margin-bottom:15px; color:var(--text-color);">Create FAQ Item</h2>
          <form id="faq-form" style="display:flex; flex-direction:column; gap:14px;">
            <div class="admin-form-group">
              <label>Question Prompt *</label>
              <input type="text" class="admin-form-control" placeholder="Do you ship outside Tamil Nadu?" required>
            </div>
            <div class="admin-form-group">
              <label>Answer Content *</label>
              <textarea class="admin-form-control" rows="3" placeholder="Yes, we ship all across India..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Save FAQ</button>
          </form>
        </div>

        <div class="glass" style="padding:25px; border-radius:12px;">
          <h2 style="font-family:'Outfit'; font-size:18px; margin-top:0; margin-bottom:15px; color:var(--text-color);">Active Store FAQs</h2>
          <div id="faq-list-container" style="display:flex; flex-direction:column; gap:10px;"></div>
        </div>
      </div>
    

    </main>

  </div>

  <!-- Scripts -->
  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/vendor/gsap.min.js"></script>
  <script src="/assets/vendor/ScrollTrigger.min.js"></script>
  <script src="/assets/vendor/lenis.min.js"></script>
  <script src="/assets/js/admin.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      window.updateAdminBreadcrumbs('Content', 'FAQ');
      loadFaqList();

      async function loadFaqList() {
        const container = document.getElementById('faq-list-container');
        if (!container) return;
        container.innerHTML = '<div style="text-align:center; padding:20px;"><div class="spinner" style="margin:auto;"></div></div>';

        let faqs = [];
        try {
          const res = await adminFetch('/api/settings/faqs');
          const data = await res.json();
          if (data.success && data.setting && data.setting.value) {
            faqs = Array.isArray(data.setting.value) ? data.setting.value : [];
          }
        } catch (e) {
          console.warn('FAQ fetch failed, starting with empty list:', e);
        }

        if (faqs.length === 0) {
          container.innerHTML = '<div style="color:var(--text-muted); text-align:center; padding:20px; font-size:13px;">No FAQ items yet. Use the form to create your first FAQ.</div>';
          return;
        }

        container.innerHTML = faqs.map((f, idx) => `
          <div class="glass" style="padding:15px; border-radius:8px; display:flex; justify-content:space-between; align-items:flex-start;">
            <div style="flex:1;">
              <strong style="color:var(--adm-accent);">Q: ${f.q}</strong>
              <p style="font-size:12px; color:var(--text-muted); margin:6px 0 0 0;">A: ${f.a}</p>
            </div>
            <button onclick="deleteFaq(${idx})" class="btn" style="background:#ef4444 !important; color:white; border:none; padding:5px 10px; font-size:10px; border-radius:6px; cursor:pointer; flex-shrink:0; margin-left:10px;">Delete</button>
          </div>
        `).join('');
      }
      window.loadFaqList = loadFaqList;

      async function saveFaqs(faqs) {
        try {
          const res = await adminFetch('/api/settings/faqs', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ value: faqs })
          });
          const data = await res.json();
          return data.success;
        } catch (e) {
          console.error('FAQ save failed:', e);
          return false;
        }
      }

      document.getElementById('faq-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const q = e.target.querySelector('input').value.trim();
        const a = e.target.querySelector('textarea').value.trim();
        if (!q || !a) { showToast('Both question and answer are required', 'error'); return; }

        // Load current FAQs from DB
        let faqs = [];
        try {
          const res = await adminFetch('/api/settings/faqs');
          const data = await res.json();
          if (data.success && data.setting && Array.isArray(data.setting.value)) {
            faqs = data.setting.value;
          }
        } catch (e) {}

        faqs.push({ id: Date.now(), q, a });
        const ok = await saveFaqs(faqs);
        if (ok) {
          showToast('FAQ registered successfully!', 'success');
          e.target.reset();
          loadFaqList();
        } else {
          showToast('Failed to save FAQ to database', 'error');
        }
      });

      window.deleteFaq = async (idx) => {
        if (!confirm('Are you sure you want to delete this FAQ?')) return;
        let faqs = [];
        try {
          const res = await adminFetch('/api/settings/faqs');
          const data = await res.json();
          if (data.success && data.setting && Array.isArray(data.setting.value)) {
            faqs = data.setting.value;
          }
        } catch (e) {}

        faqs.splice(idx, 1);
        const ok = await saveFaqs(faqs);
        if (ok) {
          showToast('FAQ deleted!', 'success');
          loadFaqList();
        } else {
          showToast('Failed to delete FAQ', 'error');
        }
      };
    
    });
  </script>
</body>
</html>
