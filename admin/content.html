<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Editor | MAGIZHVAGAM</title>

  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/appearance-studio.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
</head>
<body style="visibility:hidden">
  <div class="admin-layout">
    <!-- Sidebar navigation placeholder -->
    <aside id="admin-sidebar-container"></aside>

    <!-- Main Content -->
    <main class="admin-main" style="padding: 24px !important;">
      <h1 style="font-family:'Outfit'; font-size:32px; color:var(--text-color); margin-bottom:10px;">Content Management</h1>
      <p style="color:var(--text-muted); font-size:14px; margin-bottom:20px;">Reorder home sections, create hero sliders, add customer testimonials, edit static pages, and configure header menus.</p>

      <!-- Sub tabs row -->
      <div class="studio-tabs">
        <button type="button" class="studio-tab-btn active" data-workspace-tab="homepage">Homepage Sections</button>
        <button type="button" class="studio-tab-btn" data-workspace-tab="about">About Page</button>
        <button type="button" class="studio-tab-btn" data-workspace-tab="contact">Contact Page</button>
        <button type="button" class="studio-tab-btn" data-workspace-tab="policies">Legal Policies</button>
        <button type="button" class="studio-tab-btn" data-workspace-tab="navigation">Navigation Menus</button>
      </div>

      <!-- Workspace Mount Point -->
      <div id="workspace-container" style="margin-top:20px;"></div>
    </main>
  </div>

  <!-- Scripts -->
  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/js/media-library.js"></script>
  <script src="/assets/js/admin.js"></script>
  <script src="/assets/js/workspace-engine.js"></script>
  
  <!-- Content workspace modules -->
  <script src="/assets/js/modules/content/homepage.controller.js"></script>
  <script src="/assets/js/modules/content/about.controller.js"></script>
  <script src="/assets/js/modules/content/contact.controller.js"></script>
  <script src="/assets/js/modules/content/policies.controller.js"></script>
  <script src="/assets/js/modules/content/navigation.controller.js"></script>
  
  <!-- Content router registry -->
  <script src="/assets/js/modules/content/content.router.js"></script>
</body>
</html>
