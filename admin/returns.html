<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Returns & Claims | MAGIZHVAGAM</title>
  
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
</head>
<body style="visibility:hidden">

  <div class="admin-layout">
    
    <!-- Sidebar navigation placeholder -->
    <aside id="admin-sidebar-container"></aside>

    <!-- Main Content Panel -->
    <main class="admin-main">
      <div id="admin-topbar-container"></div>
      
      <!-- Top header -->
      <section style="margin-bottom:25px;">
        <span style="font-family:'Outfit'; font-size:12px; font-weight:700; color:var(--adm-accent); text-transform:uppercase; letter-spacing:0.1em; display:block; margin-bottom:6px;">Sales Logistics</span>
        <h1 style="font-family:'Outfit'; font-size:32px; font-weight:800; color:var(--text-color); margin:0;">Customer Returns & Claims</h1>
        <p style="color:var(--text-muted); font-size:13px; margin:4px 0 0 0;">Verify and process return requests, replace damaged merchandise, and dispatch refunds to wallets.</p>
      </section>

      
      <div class="glass table-responsive" style="padding:25px; border-radius:12px;">
        <h2 style="font-family:'Outfit'; font-size:18px; margin-top:0; margin-bottom:15px; color:var(--text-color);">Active Returns & Claims Ledger</h2>
        <table class="admin-table">
          <thead>
            <tr>
              <th>Return ID</th>
              <th>Order ID</th>
              <th>Return Item</th>
              <th>Customer Claim Reason</th>
              <th>Refund Amount</th>
              <th>Logistics Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="returns-requests-tbody">
            <!-- Rendered dynamically -->
          </tbody>
        </table>
      </div>
    

    </main>

  </div>

  <!-- Scripts -->
  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/admin-api.js"></script>
  <script src="/assets/vendor/gsap.min.js"></script>
  <script src="/assets/vendor/ScrollTrigger.min.js"></script>
  <script src="/assets/vendor/lenis.min.js"></script>
  <script src="/assets/js/admin.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      window.updateAdminBreadcrumbs('Sales', 'Returns');
      renderReturnsRequests();

      function renderReturnsRequests() {
        const tbody = document.getElementById('returns-requests-tbody');
        if (!tbody) return;

        let returnLedger = JSON.parse(localStorage.getItem('returns_ledger_data') || '[]');
        if (returnLedger.length === 0) {
          returnLedger = [
            { id: 'RET-30948', orderId: 'ORD-90832', item: 'Tanjore Art Plate x 1', reason: 'Engraving name misspelled', refund: '₹2,450', status: 'Pending' },
            { id: 'RET-31002', orderId: 'ORD-90422', item: 'Brass Vilakku Pair x 2', reason: 'Minor scratch on incense holder', refund: '₹1,200', status: 'Approved' }
          ];
          localStorage.setItem('returns_ledger_data', JSON.stringify(returnLedger));
        }

        tbody.innerHTML = returnLedger.map(r => `
          <tr>
            <td><strong style="color:var(--adm-text);">#${r.id}</strong></td>
            <td><strong>#${r.orderId}</strong></td>
            <td>${r.item}</td>
            <td><span style="font-size:12px; color:var(--adm-text-muted); font-style:italic;">"${r.reason}"</span></td>
            <td><strong>${r.refund}</strong></td>
            <td><span class="badge ${r.status === 'Approved' ? 'badge-success' : 'badge-warning'}">${r.status}</span></td>
            <td>
              ${r.status === 'Pending' ? `
                <button onclick="approveReturnRequest('${r.id}')" class="btn btn-primary" style="padding:6px 12px; font-size:11px; border-radius:6px; border:none;">Approve Refund</button>
              ` : `
                <span style="font-size:11px; color:var(--adm-text-muted); font-weight:700;">Completed</span>
              `}
            </td>
          </tr>
        `).join('');
      }
      window.renderReturnsRequests = renderReturnsRequests;

      window.approveReturnRequest = (id) => {
        let returnLedger = JSON.parse(localStorage.getItem('returns_ledger_data') || '[]');
        const idx = returnLedger.findIndex(r => r.id === id);
        if (idx !== -1) {
          returnLedger[idx].status = 'Approved';
          localStorage.setItem('returns_ledger_data', JSON.stringify(returnLedger));
          showToast(`Return Request #${id} Approved. Refund dispatched to customer wallet!`, 'success');
          renderReturnsRequests();
        }
      };
    
    });
  </script>
</body>
</html>
