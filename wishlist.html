<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Wishlist | MAGIZHVAGAM</title>

  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">

  <style>
    .wishlist-layout {
      padding: 100px 0 60px;
    }
  </style>
</head>

<body>

  <!-- Shared Header -->
  <header id="main-header"></header>

  <main class="container wishlist-layout">
    <h1 style="font-family:'Outfit'; font-size:32px; margin-bottom:40px; color:var(--text-color);">Your Saved Items</h1>

    <div class="grid grid-4" id="wishlist-grid-container" style="min-height:300px;">
      <div style="grid-column: 1/-1; text-align:center; padding:50px 0;">
        <div class="spinner" style="margin:auto;"></div>
      </div>
    </div>
  </main>

  <!-- Shared Footer -->
  <footer id="main-footer"></footer>

  <!-- Scripts -->
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/wishlist.js"></script>
</body>

</html>
