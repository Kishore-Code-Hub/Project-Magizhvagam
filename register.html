<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | MAGIZHVAGAM - Premium Return Gifts</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">

  <style>
    .auth-wrapper {
      min-height: 85vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 60px;
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      padding: 40px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }

    .form-control {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: rgba(0, 0, 0, 0.02);
      color: var(--text-color);
      transition: var(--transition);
    }

    .form-control:focus {
      border-color: hsl(var(--primary-purple));
      background: rgba(255, 255, 255, 0.9);
    }
  </style>
</head>

<body>

  <!-- Shared Header Injection Element -->
  <header id="main-header"></header>

  <div class="auth-wrapper">
    <div class="auth-card glass animated scale-in">
      <h2 style="font-size: 28px; text-align: center; margin-bottom: 8px; font-family: 'Outfit';">Create Account</h2>
      <p style="text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 25px;">Sign up to start
        saving and ordering premium gifts</p>

      <form id="register-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="Name" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="name@domain.com" required>
        </div>
        <div class="form-group">
          <label for="phone">Mobile Number</label>
          <input type="tel" id="phone" class="form-control" placeholder="e.g. 9876543210" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Minimum 8 characters" minlength="8" required>
          <!-- Real-time Password Strength Indicator -->
          <div style="margin-top: 8px;">
            <div style="height: 6px; width: 100%; background: #eee; border-radius: 3px; overflow: hidden; position: relative;">
              <div id="strength-bar" style="height: 100%; width: 0%; background: #ef4444; transition: all 0.3s ease;"></div>
            </div>
            <div id="strength-text" style="font-size: 11px; font-weight: 600; color: #ef4444; margin-top: 4px;">Very Weak</div>
          </div>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required>
        </div>
        <div class="form-group">
          <label for="address1">Address Line 1</label>
          <input type="text" id="address1" class="form-control" placeholder="House/Flat No, Street" required>
        </div>
        <div class="form-group">
          <label for="pincode">Pincode</label>
          <input type="text" id="pincode" class="form-control" placeholder="6-digit numeric" required maxlength="6" pattern="^[1-9][0-9]{5}$">
        </div>
        <div class="form-group">
          <label for="city">City</label>
          <input type="text" id="city" class="form-control" placeholder="City" required>
        </div>
        <div class="form-group">
          <label for="state">State</label>
          <input type="text" id="state" class="form-control" placeholder="State" required>
        </div>

        <div id="otp-group" class="otp-verification-card">
          <div class="otp-card-header">
            <div class="otp-shield-icon">🔐</div>
            <div>
              <div class="otp-card-title">Phone Verification</div>
              <div class="otp-card-subtitle">Enter the 4-digit code sent to your phone</div>
            </div>
          </div>
          <input type="text" id="otp" class="otp-input-field" placeholder="• • • •" maxlength="4" inputmode="numeric" autocomplete="one-time-code">
          <button type="button" id="verify-otp-btn" class="otp-verify-btn">Verify OTP & Create Account</button>
        </div>

        <button type="submit" class="btn btn-primary"
          style="width: 100%; margin-top: 10px; border-radius: 8px;">Register</button>
      </form>



      <div style="text-align: center; margin-top: 24px; font-size: 14px;">
        <span style="color: var(--text-muted);">Already have an account?</span>
        <a href="/login.html" style="color: hsl(var(--primary-purple)); font-weight: 700; margin-left: 4px;">Sign In</a>
      </div>
    </div>
  </div>

  <!-- Shared Footer Injection Element -->
  <footer id="main-footer"></footer>

  <!-- Scripts -->
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script>
    document.getElementById('pincode').addEventListener('input', async (e) => {
      const pincode = e.target.value.trim();
      const cityInput = document.getElementById('city');
      const stateInput = document.getElementById('state');

      // Check if it matches a valid 6-digit pincode format before fetching
      if (/^[1-9][0-9]{5}$/.test(pincode)) {
        try {
          const res = await fetch(`https://api.postalpincode.in/pincode/${pincode}`);
          if (!res.ok) throw new Error('API response error');
          const data = await res.json();
          
          if (data && data[0] && data[0].Status === 'Success' && data[0].PostOffice && data[0].PostOffice.length > 0) {
            const postOffice = data[0].PostOffice[0];
            cityInput.value = postOffice.District;
            stateInput.value = postOffice.State;
            
            // Lock fields
            cityInput.readOnly = true;
            stateInput.readOnly = true;
          } else {
            showToast('Invalid Indian Pincode. Please verify.', 'error');
            cityInput.value = '';
            stateInput.value = '';
            cityInput.readOnly = false;
            stateInput.readOnly = false;
          }
        } catch (err) {
          console.error('Pincode fetch failed:', err);
          showToast('Pincode verification service unavailable. Please enter City and State manually.', 'warning');
          // Fallback: unlock fields so user isn't blocked
          cityInput.readOnly = false;
          stateInput.readOnly = false;
        }
      } else {
        // Unlock fields if pincode is partially typed or cleared
        cityInput.readOnly = false;
        stateInput.readOnly = false;
      }
    });

    let otpSent = false;

    // Real-time Password Strength Meter
    const passwordInput = document.getElementById('password');
    const strengthBar = document.getElementById('strength-bar');
    const strengthText = document.getElementById('strength-text');

    passwordInput.addEventListener('input', () => {
      const val = passwordInput.value;
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[a-z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(val)) score++;

      let percent = (score / 5) * 100;
      strengthBar.style.width = percent + '%';

      if (score <= 1) {
        strengthBar.style.background = '#ef4444';
        strengthText.textContent = 'Very Weak';
        strengthText.style.color = '#ef4444';
      } else if (score <= 3) {
        strengthBar.style.background = '#f59e0b';
        strengthText.textContent = 'Medium';
        strengthText.style.color = '#f59e0b';
      } else if (score === 4) {
        strengthBar.style.background = '#3b82f6';
        strengthText.textContent = 'Strong';
        strengthText.style.color = '#3b82f6';
      } else {
        strengthBar.style.background = '#10b981';
        strengthText.textContent = 'Enterprise Secure';
        strengthText.style.color = '#10b981';
      }
    });



    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const address1 = document.getElementById('address1').value.trim();
      const pincode = document.getElementById('pincode').value.trim();
      const city = document.getElementById('city').value.trim();
      const state = document.getElementById('state').value.trim();

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showToast('Please enter a valid email address format.', 'error');
        return;
      }

      const phoneRegex = /^[0-9]{10}$/;
      if (!phoneRegex.test(phone)) {
        showToast('Please enter a valid 10 digit mobile number.', 'error');
        return;
      }

      const pincodeRegex = /^[1-9][0-9]{5}$/;
      if (!pincodeRegex.test(pincode)) {
        showToast('Please enter a valid 6 digit Indian pincode.', 'error');
        return;
      }

      if (password !== confirmPassword) {
        showToast('Passwords do not match!', 'error');
        return;
      }

      // Enterprise password strength check
      const strengthRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]).{8,}$/;
      if (!strengthRegex.test(password)) {
        showToast('Password does not meet enterprise security requirements: minimum 8 characters, at least 1 uppercase letter, 1 lowercase letter, 1 numerical digit, and 1 special symbol.', 'error');
        return;
      }

      if (!otpSent) {
        // Lock form inputs
        ['name', 'email', 'phone', 'password', 'confirm-password', 'address1', 'pincode', 'city', 'state'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.disabled = true;
        });
        
        // Disable main Register submit button
        const submitBtn = e.target.querySelector('button[type="submit"]');
        if (submitBtn) {
          submitBtn.disabled = true;
          submitBtn.style.opacity = '0.6';
          submitBtn.style.cursor = 'not-allowed';
        }

        // Show OTP entry group with animation
        document.getElementById('otp-group').classList.add('visible');
        showToast('Simulated OTP sent to your phone! Use 1234 to verify.', 'success');
        otpSent = true;
      }
    });

    document.getElementById('verify-otp-btn').addEventListener('click', async () => {
      const otpVal = document.getElementById('otp').value.trim();
      if (otpVal === '1234') {
        showToast('OTP verified successfully! Creating account and sending email...', 'success');
        
        // Fetch values
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const address1 = document.getElementById('address1').value.trim();
        const pincode = document.getElementById('pincode').value.trim();
        const city = document.getElementById('city').value.trim();
        const state = document.getElementById('state').value.trim();

        await handleRegister(name, email, phone, password, address1, pincode, city, state);
      } else {
        showToast('Invalid OTP code. Please try again.', 'error');
      }
    });
  </script>
</body>
</html>
