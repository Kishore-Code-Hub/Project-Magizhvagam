<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | MAGIZHVAGAM - Premium Return Gifts</title>
  <link rel="stylesheet" href="/assets/css/theme.defaults.css">
  <link rel="stylesheet" href="/assets/css/design-system.css">
  <link rel="stylesheet" href="/assets/css/typography.css">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
  <style id="mz-theme-vars"></style>
  <script src="/assets/js/theme-loader.js"></script>

  <style>
    .auth-wrapper {
      min-height: 85vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 60px;
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      padding: 40px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }

    .form-control {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid var(--card-border);
      background: rgba(0, 0, 0, 0.02);
      color: var(--text-color);
      transition: var(--transition);
    }

    .form-control:focus {
      border-color: hsl(var(--primary-purple));
      background: rgba(255, 255, 255, 0.9);
    }
  </style>
</head>

<body class="inner-page">

  <!-- Shared Header Injection Element -->
  <header id="main-header" class="glass-panel mz-storefront-header"></header>

  <div class="auth-wrapper">
    <div class="auth-card glass animated scale-in">
      <h2 style="font-size: 28px; text-align: center; margin-bottom: 8px; font-family: 'Outfit';">Create Account</h2>
      <p style="text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 25px;">Sign up to start
        saving and ordering premium gifts</p>

      <form id="register-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="Name" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="name@domain.com" required>
        </div>
        <div class="form-group">
          <label for="phone">Mobile Number</label>
          <input type="tel" id="phone" class="form-control" placeholder="e.g. 9876543210" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Minimum 8 characters" minlength="8" required>
          <!-- Real-time Password Strength Indicator -->
          <div style="margin-top: 8px;">
            <div style="height: 6px; width: 100%; background: #eee; border-radius: 3px; overflow: hidden; position: relative;">
              <div id="strength-bar" style="height: 100%; width: 0%; background: #ef4444; transition: all 0.3s ease;"></div>
            </div>
            <div id="strength-text" style="font-size: 11px; font-weight: 600; color: #ef4444; margin-top: 4px;">Very Weak</div>
          </div>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary"
          style="width: 100%; margin-top: 10px; border-radius: 8px;">Register</button>
      </form>

      <div style="text-align: center; margin-top: 24px; font-size: 14px;">
        <span style="color: var(--text-muted);">Already have an account?</span>
        <a href="/login.html" style="color: hsl(var(--primary-purple)); font-weight: 700; margin-left: 4px;">Sign In</a>
      </div>

      <!-- Registration OTP Container -->
      <div id="otp-container" style="display: none;">
        <h2 style="font-size: 26px; text-align: center; margin-bottom: 8px; font-family: 'Outfit';">Verify Email</h2>
        <p style="text-align: center; color: var(--text-muted); font-size: 13px; margin-bottom: 25px;">We have sent a 6-digit OTP code to <strong id="sent-otp-email">your email</strong>. Enter the OTP below to activate your account.</p>
        
        <form id="otp-verify-form">
          <div class="form-group">
            <label for="otp-code">6-Digit OTP</label>
            <input type="text" id="otp-code" class="form-control" placeholder="123456" maxlength="6" pattern="[0-9]{6}" required style="text-align: center; font-size: 20px; letter-spacing: 4px;">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px; border-radius: 8px;">Verify OTP</button>
          
          <div id="otp-timer-container" style="margin-top: 20px; padding: 16px; border-radius: 8px; background: rgba(106, 13, 173, 0.05); border: 1px solid rgba(106, 13, 173, 0.15); text-align: center;">
            <p style="margin: 0 0 8px; font-size: 13px; color: var(--text-color);">Resend code available in:</p>
            <div id="otp-timer-clock" style="font-size: 24px; font-weight: 700; color: hsl(var(--primary-purple)); font-family: monospace;">03:00</div>
            <button type="button" id="resend-otp-btn" class="btn btn-secondary" style="width: 100%; margin-top: 14px; border-radius: 8px; font-size: 12px; padding: 8px 0;" disabled>Request New OTP</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Shared Footer Injection Element -->
  <footer id="main-footer" class="ft-layout-wrapper"></footer>

  <!-- Scripts -->
  <script src="/assets/js/animation-loader.js"></script>
  <script src="/assets/js/nav.js"></script>
  <script src="/assets/js/footer.js"></script>
  <script src="/assets/vendor/gsap.min.js"></script>
  <script src="/assets/vendor/ScrollTrigger.min.js"></script>
  <script src="/assets/vendor/lenis.min.js"></script>
  <script src="/assets/js/motion-system.js"></script>
  <script src="/assets/js/storefront-init.js"></script>
  <script src="/assets/js/store-enhancements.js"></script>
  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script>
    (function () {
      'use strict';
      let abortController = null;
      let otpTimerInterval = null;

      async function initPage() {
        if (abortController) abortController.abort();
        abortController = new AbortController();
        const signal = abortController.signal;

        try {
          initRegister({ signal });
        } catch (e) {
          console.error('[MZPage] Register init failed:', e);
        }
      }

      function destroyPage() {
        if (abortController) {
          abortController.abort();
          abortController = null;
        }
        if (otpTimerInterval) {
          clearInterval(otpTimerInterval);
          otpTimerInterval = null;
        }
      }

      window.MZPageRegistry = window.MZPageRegistry || {};
      window.MZPageRegistry['register'] = {
        init: initPage,
        destroy: destroyPage
      };

      function initRegister(options = {}) {
        // Real-time Password Strength Meter
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strength-bar');
        const strengthText = document.getElementById('strength-text');
        if (!passwordInput) return;

        passwordInput.addEventListener('input', () => {
          const val = passwordInput.value;
          let score = 0;
          if (val.length >= 8) score++;
          if (/[A-Z]/.test(val)) score++;
          if (/[a-z]/.test(val)) score++;
          if (/[0-9]/.test(val)) score++;
          if (/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(val)) score++;

          let percent = (score / 5) * 100;
          strengthBar.style.width = percent + '%';

          if (score <= 1) {
            strengthBar.style.background = '#ef4444';
            strengthText.textContent = 'Very Weak';
            strengthText.style.color = '#ef4444';
          } else if (score <= 3) {
            strengthBar.style.background = '#f59e0b';
            strengthText.textContent = 'Medium';
            strengthText.style.color = '#f59e0b';
          } else if (score === 4) {
            strengthBar.style.background = '#3b82f6';
            strengthText.textContent = 'Strong';
            strengthText.style.color = '#3b82f6';
          } else {
            strengthBar.style.background = '#10b981';
            strengthText.textContent = 'Enterprise Secure';
            strengthText.style.color = '#10b981';
          }
        });

        function startOtpTimer() {
          if (otpTimerInterval) clearInterval(otpTimerInterval);
          const resendBtn = document.getElementById('resend-otp-btn');
          const timerClock = document.getElementById('otp-timer-clock');
          resendBtn.setAttribute('disabled', 'true');
      resendBtn.setAttribute('style', 'width: 100%; margin-top: 14px; border-radius: 8px; font-size: 12px; padding: 8px 0; opacity: 0.5; pointer-events: none; cursor: not-allowed;');
      
      const duration = 180; // 3 minutes in seconds
      const endTime = Date.now() + duration * 1000;
      
      function updateTimer() {
        const now = Date.now();
        const timeLeft = Math.max(0, Math.ceil((endTime - now) / 1000));
        
        if (timeLeft <= 0) {
          clearInterval(otpTimerInterval);
          otpTimerInterval = null;
          timerClock.textContent = "00:00";
          resendBtn.removeAttribute('disabled');
          resendBtn.setAttribute('style', 'width: 100%; margin-top: 14px; border-radius: 8px; font-size: 12px; padding: 8px 0;');
        } else {
          const minutes = Math.floor(timeLeft / 60);
          const seconds = timeLeft % 60;
          timerClock.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
          resendBtn.setAttribute('disabled', 'true');
          resendBtn.setAttribute('style', 'width: 100%; margin-top: 14px; border-radius: 8px; font-size: 12px; padding: 8px 0; opacity: 0.5; pointer-events: none; cursor: not-allowed;');
        }
      }
      
      updateTimer();
      otpTimerInterval = setInterval(updateTimer, 1000);
    }

        document.getElementById('otp-verify-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const otp = document.getElementById('otp-code').value.trim();
          const email = window.registeredEmail;
          
          try {
            const res = await fetch('/api/auth/verify-otp', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email, otp }),
              ...options
            });
        const data = await res.json();
        if (data.success) {
          showToast('Email verified successfully! Redirecting to login...', 'success');
          setTimeout(() => {
            window.location.replace('/login.html?verified=true');
          }, 2000);
        } else {
          showToast(data.error || 'Verification failed', 'error');
        }
      } catch (err) {
        showToast('Connection error during OTP verification', 'error');
      }
    });

        document.getElementById('resend-otp-btn').addEventListener('click', async () => {
          const email = window.registeredEmail;
          try {
            const res = await fetch('/api/auth/resend-otp', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email }),
              ...options
            });
        const data = await res.json();
        if (data.success) {
          showToast('A new OTP code has been sent to your email.', 'success');
          startOtpTimer();
        } else {
          showToast(data.error || 'Failed to resend OTP', 'error');
        }
      } catch (err) {
        showToast('Connection error resending OTP', 'error');
      }
    });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const name = document.getElementById('name').value.trim();
          const email = document.getElementById('email').value.trim();
          const phone = document.getElementById('phone').value.trim();
          const password = document.getElementById('password').value;
          const confirmPassword = document.getElementById('confirm-password').value;

          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailRegex.test(email)) {
            showToast('Please enter a valid email address format.', 'error');
            return;
          }

          const phoneRegex = /^[0-9]{10}$/;
          if (!phoneRegex.test(phone)) {
            showToast('Please enter a valid 10 digit mobile number.', 'error');
            return;
          }

          if (password !== confirmPassword) {
            showToast('Passwords do not match!', 'error');
            return;
          }

          // Enterprise password strength check
          const strengthRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]).{8,}$/;
          if (!strengthRegex.test(password)) {
            showToast('Password does not meet enterprise security requirements: minimum 8 characters, at least 1 uppercase letter, 1 lowercase letter, 1 numerical digit, and 1 special symbol.', 'error');
            return;
          }

          // Lock form inputs
          ['name', 'email', 'phone', 'password', 'confirm-password'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.disabled = true;
          });
          
          // Disable main Register submit button and show loading state
          const submitBtn = e.target.querySelector('button[type="submit"]');
          if (submitBtn) {
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.6';
            submitBtn.style.cursor = 'not-allowed';
            submitBtn.innerHTML = '<span class="spinner" style="display:inline-block; width:12px; height:12px; border:2px solid rgba(255,255,255,0.3); border-left-color:#fff; border-radius:50%; animation:spin 1s linear infinite; margin-right:8px; vertical-align:middle;"></span>Processing Registration...';
          }

          showToast('Creating account and sending verification email...', 'info');
          try {
            const res = await fetch('/api/auth/register', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name, email, phone, password }),
              ...options
            });
        const data = await res.json();
        if (!data.success) {
          showToast(data.error || 'Registration failed', 'error');
          // Unlock inputs
          ['name', 'email', 'phone', 'password', 'confirm-password'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.disabled = false;
          });
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.style.opacity = '1';
            submitBtn.style.cursor = 'pointer';
            submitBtn.innerHTML = 'Register';
          }
          return;
        }

        showToast('Registration successful! A verification OTP has been sent.', 'success');
        window.registeredEmail = email;
        document.getElementById('sent-otp-email').textContent = email;
        
        // Transition to OTP Verify container
        document.getElementById('register-form').style.display = 'none';
        const cardTitle = document.querySelector('.auth-card h2');
        if (cardTitle) cardTitle.style.display = 'none';
        const cardDesc = document.querySelector('.auth-card p');
        if (cardDesc) cardDesc.style.display = 'none';
        
        document.getElementById('otp-container').style.display = 'block';
        startOtpTimer();

      } catch (error) {
        showToast('Connection error during registration', 'error');
        ['name', 'email', 'phone', 'password', 'confirm-password'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.disabled = false;
        });
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.style.opacity = '1';
          submitBtn.style.cursor = 'pointer';
          submitBtn.innerHTML = 'Register';
        }
      }
        });
      }
    }

  })();
  </script>
</body>
</html>
