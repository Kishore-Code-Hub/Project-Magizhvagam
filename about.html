<!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Read the story of MAGIZHVAGAM. Discover how we design premium return gifts and customized gift items for weddings, birthdays, and festivals.">
  <title>Our Story | MAGIZHVAGAM - Premium Return Gifts</title>
  
  <link rel="stylesheet" href="/assets/css/theme.defaults.css">
  <link rel="stylesheet" href="/assets/css/design-system.css">
  <link rel="stylesheet" href="/assets/css/typography.css">
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="stylesheet" href="/assets/css/animations.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
  <style id="mz-theme-vars"></style>
  <script src="/assets/js/theme-loader.js"></script>
  
  <style>
    .about-layout {
      padding: 120px 0 60px;
    }
    .about-section {
      margin-bottom: 60px;
      line-height: 1.8;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <!-- Shared Header -->
  <header id="main-header"></header>

  <main class="container about-layout">
    <div class="about-section glass animated scale-in" style="padding:40px; border-radius:16px; margin-bottom:40px;">
      <h1 id="about-story-heading" style="font-family:var(--font-display); font-size:36px; margin-bottom:20px; text-align:center; color:var(--color-text-primary);"></h1>
      <p id="about-story-intro" style="margin-bottom:20px; font-size:16px; text-align:center; max-width:700px; margin: 0 auto 30px; color:var(--text-muted);"></p>
      
      <div class="grid grid-2" style="gap:40px; align-items:center; margin-top:30px;">
        <div>
          <h3 id="about-left-heading" style="font-family:'Outfit'; font-size:22px; margin-bottom:16px;"></h3>
          <p id="about-left-p1" style="color:var(--text-muted); margin-bottom:14px;"></p>
          <p id="about-left-p2" style="color:var(--text-muted);"></p>
        </div>
        <div style="border-radius:12px; overflow:hidden; height:300px; border: 1px solid var(--card-border);">
          <div id="about-story-image" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:transparent !important;">
            <img id="about-story-image-el" alt="" style="width:100%; height:100%; object-fit:cover; display:none;">
          </div>
        </div>
      </div>
    </div>

    <!-- Stats summary grid -->
    <div class="grid grid-3 about-section" style="gap:30px; text-align:center;">
      <div class="glass" style="padding:30px; border-radius:12px;">
        <h2 style="font-size:42px; color:hsl(var(--primary-purple)); margin-bottom:8px;">10k+</h2>
        <h4 style="font-family:'Outfit'; font-size:16px; margin-bottom:8px;">Satisfied Hosts</h4>
        <p style="font-size:13px; color:var(--text-muted);">Helping families celebrate special life milestones.</p>
      </div>
      <div class="glass" style="padding:30px; border-radius:12px;">
        <h2 style="font-size:42px; color:hsl(var(--primary-purple)); margin-bottom:8px;">500k+</h2>
        <h4 style="font-family:'Outfit'; font-size:16px; margin-bottom:8px;">Gifts Delivered</h4>
        <p style="font-size:13px; color:var(--text-muted);">Crafting smiling memories across India.</p>
      </div>
      <div class="glass" style="padding:30px; border-radius:12px;">
        <h2 style="font-size:42px; color:hsl(var(--primary-purple)); margin-bottom:8px;">100%</h2>
        <h4 style="font-family:'Outfit'; font-size:16px; margin-bottom:8px;">Customized Designs</h4>
        <p style="font-size:13px; color:var(--text-muted);">Every order is tailored with customized cards & details.</p>
      </div>
    </div>
  </main>

  <!-- Shared Footer -->
  <footer id="main-footer"></footer>

  <!-- Scripts -->
  <script>
    // Load About page content dynamically from API
    (function(){
      async function loadAbout() {
        try {
          // cache-bust to ensure storefront fetches latest saved image after admin updates
          const res = await fetch('/api/about-page?_=' + Date.now());
          const json = await res.json();
          console.log('About API:', json);
          if (!json.success || !json.data) return;
          const d = json.data;
          document.getElementById('about-story-heading').textContent = d.storyHeading || '';
          document.getElementById('about-story-intro').textContent = d.storyIntro || '';
          document.getElementById('about-left-heading').textContent = d.leftHeading || '';
          document.getElementById('about-left-p1').textContent = d.leftParagraph1 || '';
          document.getElementById('about-left-p2').textContent = d.leftParagraph2 || '';
          const imgEl = document.getElementById('about-story-image-el');
          if (d.image) {
            // append timestamp to avoid cached responses for the image itself
            const sep = d.image.includes('?') ? '&' : '?';
            const url = d.image + sep + '_=' + Date.now();
            imgEl.onload = () => { imgEl.style.display = 'block'; };
            imgEl.onerror = () => { imgEl.removeAttribute('src'); imgEl.style.display = 'none'; console.warn('About image failed to load:', d.image); };
            imgEl.src = url;
          } else {
            imgEl.removeAttribute('src');
            imgEl.style.display = 'none';
          }
        } catch (err) {
          console.error('Failed to load about page content', err);
        }
      }
      document.addEventListener('DOMContentLoaded', loadAbout);
    })();
  </script>
  <script src="/assets/js/animation-loader.js"></script>
  <script src="/assets/js/nav.js"></script>
  <script src="/assets/js/footer.js"></script>
  <script src="/assets/js/storefront-init.js"></script>
  <script src="/assets/js/app.js"></script>
</body>
</html>
